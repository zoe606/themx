<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED"/>
      <stop offset="50%" style="stop-color:#EC4899"/>
      <stop offset="100%" style="stop-color:#06B6D4"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="#0F172A"/>
  <circle cx="200" cy="150" r="200" fill="url(#bg-grad)" opacity="0.6"/>
  <circle cx="600" cy="450" r="250" fill="url(#bg-grad)" opacity="0.4"/>
  <!-- Glass panel 1 -->
  <rect x="80" y="60" width="640" height="100" rx="16" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <text x="400" y="120" text-anchor="middle" font-family="sans-serif" font-size="32" font-weight="600" fill="#F8FAFC">Glassmorphism</text>
  <!-- Glass panel 2 -->
  <rect x="80" y="200" width="300" height="320" rx="16" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <rect x="100" y="220" width="260" height="20" rx="4" fill="rgba(255,255,255,0.2)"/>
  <rect x="100" y="260" width="200" height="12" rx="4" fill="rgba(255,255,255,0.1)"/>
  <rect x="100" y="284" width="230" height="12" rx="4" fill="rgba(255,255,255,0.1)"/>
  <rect x="100" y="308" width="180" height="12" rx="4" fill="rgba(255,255,255,0.1)"/>
  <rect x="100" y="440" width="120" height="40" rx="20" fill="rgba(124,58,237,0.5)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <text x="160" y="466" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#F8FAFC">Explore</text>
  <!-- Glass panel 3 (overlapping) -->
  <rect x="420" y="240" width="300" height="280" rx="16" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <circle cx="570" cy="340" r="50" fill="rgba(236,72,153,0.3)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <rect x="440" y="420" width="260" height="12" rx="4" fill="rgba(255,255,255,0.1)"/>
  <rect x="440" y="444" width="200" height="12" rx="4" fill="rgba(255,255,255,0.1)"/>
  <rect x="440" y="468" width="220" height="12" rx="4" fill="rgba(255,255,255,0.1)"/>
</svg>
