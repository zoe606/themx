  <circle cx="700" cy="350" r="100" fill="#06B6D4" opacity="0.12"/>
  <!-- Sidebar glass panel -->
  <rect x="0" y="0" width="180" height="450" fill="white" fill-opacity="0.06" stroke-right="white" stroke-opacity="0.1"/>
  <line x1="180" y1="0" x2="180" y2="450" stroke="white" stroke-opacity="0.15" stroke-width="1"/>
  <!-- Sidebar content -->
  <text x="24" y="40" font-family="Poppins, sans-serif" font-size="18" font-weight="600" fill="#F8FAFC">Panel</text>
  <rect x="12" y="60" width="156" height="36" rx="8" fill="white" fill-opacity="0.1"/>
  <text x="28" y="84" font-family="Inter, sans-serif" font-size="13" fill="#F8FAFC">Dashboard</text>
  <text x="28" y="120" font-family="Inter, sans-serif" font-size="13" fill="#F8FAFC" fill-opacity="0.5">Analytics</text>
