  <text x="230" y="90" font-family="Inter, sans-serif" font-size="12" fill="#F8FAFC" fill-opacity="0.6">Total Users</text>
  <text x="230" y="125" font-family="Poppins, sans-serif" font-size="28" font-weight="600" fill="#F8FAFC">12,847</text>
  <text x="230" y="145" font-family="Inter, sans-serif" font-size="11" fill="#06B6D4">+12.5%</text>
  <rect x="405" y="60" width="180" height="100" rx="14" fill="white" fill-opacity="0.08" stroke="white" stroke-opacity="0.15" stroke-width="1"/>
  <text x="425" y="90" font-family="Inter, sans-serif" font-size="12" fill="#F8FAFC" fill-opacity="0.6">Revenue</text>
  <text x="425" y="125" font-family="Poppins, sans-serif" font-size="28" font-weight="600" fill="#F8FAFC">$48.2K</text>
  <text x="425" y="145" font-family="Inter, sans-serif" font-size="11" fill="#06B6D4">+8.3%</text>
  <rect x="600" y="60" width="180" height="100" rx="14" fill="white" fill-opacity="0.08" stroke="white" stroke-opacity="0.15" stroke-width="1"/>
  <text x="620" y="90" font-family="Inter, sans-serif" font-size="12" fill="#F8FAFC" fill-opacity="0.6">Conversion</text>
  <text x="620" y="125" font-family="Poppins, sans-serif" font-size="28" font-weight="600" fill="#F8FAFC">3.24%</text>
  <text x="620" y="145" font-family="Inter, sans-serif" font-size="11" fill="#EC4899">-0.4%</text>
  <!-- Chart panel -->
