  <text x="230" y="210" font-family="Poppins, sans-serif" font-size="16" font-weight="600" fill="#F8FAFC">Activity Overview</text>
  <!-- Line chart simulation -->
  <polyline points="240,380 290,340 340,360 390,300 440,320 490,270 540,290" stroke="#7C3AED" stroke-width="2" fill="none"/>
  <polyline points="240,390 290,370 340,380 390,350 440,360 490,330 540,340" stroke="#EC4899" stroke-width="2" fill="none" stroke-dasharray="4,4"/>
  <!-- Right panel -->
  <rect x="600" y="180" width="180" height="250" rx="14" fill="white" fill-opacity="0.08" stroke="white" stroke-opacity="0.15" stroke-width="1"/>
  <text x="620" y="210" font-family="Poppins, sans-serif" font-size="14" font-weight="600" fill="#F8FAFC">Recent</text>
  <rect x="612" y="225" width="156" height="32" rx="6" fill="white" fill-opacity="0.06"/>
  <text x="624" y="246" font-family="Inter, sans-serif" font-size="11" fill="#F8FAFC" fill-opacity="0.7">New signup</text>
  <rect x="612" y="265" width="156" height="32" rx="6" fill="white" fill-opacity="0.06"/>
  <text x="624" y="286" font-family="Inter, sans-serif" font-size="11" fill="#F8FAFC" fill-opacity="0.7">Payment received</text>
  <rect x="612" y="305" width="156" height="32" rx="6" fill="white" fill-opacity="0.06"/>
  <text x="624" y="326" font-family="Inter, sans-serif" font-size="11" fill="#F8FAFC" fill-opacity="0.7">Order shipped</text>
  <rect x="612" y="345" width="156" height="32" rx="6" fill="white" fill-opacity="0.06"/>
  <text x="624" y="366" font-family="Inter, sans-serif" font-size="11" fill="#F8FAFC" fill-opacity="0.7">Bug reported</text>
  <rect x="612" y="385" width="156" height="32" rx="6" fill="white" fill-opacity="0.06"/>
  <text x="624" y="406" font-family="Inter, sans-serif" font-size="11" fill="#F8FAFC" fill-opacity="0.7">Deploy complete</text>
