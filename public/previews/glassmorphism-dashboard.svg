<svg width="800" height="450" viewBox="0 0 800 450" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gd-bg" x1="0" y1="0" x2="800" y2="450">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E1B4B"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#gd-bg)"/>
  <!-- Background orbs -->
  <circle cx="100" cy="200" r="150" fill="#7C3AED" opacity="0.15"/>
