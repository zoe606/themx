<svg width="800" height="450" viewBox="0 0 800 450" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#0A0A0A"/>
  <!-- Title -->
  <text x="400" y="40" font-family="Lato, sans-serif" font-size="11" fill="#D4AF37" text-anchor="middle" letter-spacing="3">COLLECTIONS</text>
  <line x1="340" y1="50" x2="460" y2="50" stroke="#D4AF37" stroke-width="0.5" stroke-opacity="0.3"/>
  <!-- Card 1 -->
  <rect x="50" y="75" width="220" height="310" fill="none" stroke="#D4AF37" stroke-width="0.5" stroke-opacity="0.3"/>
  <rect x="50" y="75" width="220" height="120" fill="#D4AF37" fill-opacity="0.05"/>
  <line x1="50" y1="195" x2="270" y2="195" stroke="#D4AF37" stroke-width="0.5" stroke-opacity="0.2"/>
  <text x="160" y="145" font-family="Playfair Display, Georgia, serif" font-size="36" fill="#D4AF37" text-anchor="middle">I</text>
  <text x="160" y="230" font-family="Playfair Display, Georgia, serif" font-size="20" fill="#E5E5E5" text-anchor="middle">Heritage</text>
  <text x="160" y="260" font-family="Lato, sans-serif" font-size="12" fill="#C0C0C0" text-anchor="middle">Timeless elegance that</text>
  <text x="160" y="278" font-family="Lato, sans-serif" font-size="12" fill="#C0C0C0" text-anchor="middle">transcends fleeting trends.</text>
  <rect x="110" y="320" width="100" height="34" fill="none" stroke="#D4AF37" stroke-width="0.5"/>
  <text x="160" y="342" font-family="Lato, sans-serif" font-size="10" fill="#D4AF37" text-anchor="middle" letter-spacing="2">VIEW</text>
  <!-- Card 2 -->
  <rect x="290" y="75" width="220" height="310" fill="none" stroke="#D4AF37" stroke-width="0.5" stroke-opacity="0.3"/>
  <rect x="290" y="75" width="220" height="120" fill="#8B0000" fill-opacity="0.1"/>
  <line x1="290" y1="195" x2="510" y2="195" stroke="#D4AF37" stroke-width="0.5" stroke-opacity="0.2"/>
  <text x="400" y="145" font-family="Playfair Display, Georgia, serif" font-size="36" fill="#D4AF37" text-anchor="middle">II</text>
  <text x="400" y="230" font-family="Playfair Display, Georgia, serif" font-size="20" fill="#E5E5E5" text-anchor="middle">Prestige</text>
  <text x="400" y="260" font-family="Lato, sans-serif" font-size="12" fill="#C0C0C0" text-anchor="middle">Refined luxury for those</text>
  <text x="400" y="278" font-family="Lato, sans-serif" font-size="12" fill="#C0C0C0" text-anchor="middle">who appreciate the finest.</text>
  <rect x="350" y="320" width="100" height="34" fill="none" stroke="#D4AF37" stroke-width="0.5"/>
  <text x="400" y="342" font-family="Lato, sans-serif" font-size="10" fill="#D4AF37" text-anchor="middle" letter-spacing="2">VIEW</text>
  <!-- Card 3 -->
  <rect x="530" y="75" width="220" height="310" fill="none" stroke="#D4AF37" stroke-width="0.5" stroke-opacity="0.3"/>
  <rect x="530" y="75" width="220" height="120" fill="#D4AF37" fill-opacity="0.08"/>
  <line x1="530" y1="195" x2="750" y2="195" stroke="#D4AF37" stroke-width="0.5" stroke-opacity="0.2"/>
  <text x="640" y="145" font-family="Playfair Display, Georgia, serif" font-size="36" fill="#D4AF37" text-anchor="middle">III</text>
  <text x="640" y="230" font-family="Playfair Display, Georgia, serif" font-size="20" fill="#E5E5E5" text-anchor="middle">Signature</text>
  <text x="640" y="260" font-family="Lato, sans-serif" font-size="12" fill="#C0C0C0" text-anchor="middle">A defining expression of</text>
  <text x="640" y="278" font-family="Lato, sans-serif" font-size="12" fill="#C0C0C0" text-anchor="middle">individual sophistication.</text>
  <rect x="590" y="320" width="100" height="34" fill="none" stroke="#D4AF37" stroke-width="0.5"/>
  <text x="640" y="342" font-family="Lato, sans-serif" font-size="10" fill="#D4AF37" text-anchor="middle" letter-spacing="2">VIEW</text>
  <!-- Bottom line -->
  <line x1="50" y1="420" x2="750" y2="420" stroke="#D4AF37" stroke-width="0.5" stroke-opacity="0.2"/>
</svg>