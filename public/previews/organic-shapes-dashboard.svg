<svg width="800" height="450" viewBox="0 0 800 450" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#FFF7ED"/>
  <!-- Background blobs -->
  <ellipse cx="100" cy="100" rx="120" ry="80" fill="#F97316" opacity="0.06"/>
  <ellipse cx="700" cy="400" rx="100" ry="70" fill="#8B5CF6" opacity="0.05"/>
  <!-- Sidebar -->
  <rect x="0" y="0" width="180" height="450" rx="0" fill="#FFFFFF" stroke="#F97316" stroke-width="1" stroke-opacity="0.1"/>
  <text x="90" y="35" text-anchor="middle" font-family="DM Sans, sans-serif" font-size="16" font-weight="700" fill="#1C1917">Organica</text>
  <rect x="14" y="55" width="152" height="36" rx="18" fill="#F97316" opacity="0.1"/>
  <text x="90" y="78" text-anchor="middle" font-family="DM Sans, sans-serif" font-size="12" font-weight="600" fill="#F97316">Dashboard</text>
  <text x="90" y="118" text-anchor="middle" font-family="DM Sans, sans-serif" font-size="12" fill="#1C1917" opacity="0.4">Analytics</text>
  <text x="90" y="148" text-anchor="middle" font-family="DM Sans, sans-serif" font-size="12" fill="#1C1917" opacity="0.4">Projects</text>
  <text x="90" y="178" text-anchor="middle" font-family="DM Sans, sans-serif" font-size="12" fill="#1C1917" opacity="0.4">Settings</text>
  <!-- Stat cards -->
  <rect x="200" y="15" width="185" height="80" rx="20" fill="#FFFFFF" stroke="#F97316" stroke-width="1" stroke-opacity="0.15"/>
  <text x="292" y="48" text-anchor="middle" font-family="DM Sans, sans-serif" font-size="22" font-weight="700" fill="#F97316">1,842</text>
  <text x="292" y="70" text-anchor="middle" font-family="DM Sans, sans-serif" font-size="11" fill="#1C1917" opacity="0.4">Active Users</text>
  <rect x="400" y="15" width="185" height="80" rx="20" fill="#FFFFFF" stroke="#8B5CF6" stroke-width="1" stroke-opacity="0.15"/>
  <text x="492" y="48" text-anchor="middle" font-family="DM Sans, sans-serif" font-size="22" font-weight="700" fill="#8B5CF6">$6.3k</text>
  <text x="492" y="70" text-anchor="middle" font-family="DM Sans, sans-serif" font-size="11" fill="#1C1917" opacity="0.4">Revenue</text>
  <rect x="600" y="15" width="180" height="80" rx="20" fill="#FFFFFF" stroke="#22D3EE" stroke-width="1" stroke-opacity="0.15"/>
  <text x="690" y="48" text-anchor="middle" font-family="DM Sans, sans-serif" font-size="22" font-weight="700" fill="#22D3EE">92%</text>
  <text x="690" y="70" text-anchor="middle" font-family="DM Sans, sans-serif" font-size="11" fill="#1C1917" opacity="0.4">Satisfaction</text>
  <!-- Chart panel -->
  <rect x="200" y="110" width="380" height="320" rx="24" fill="#FFFFFF" stroke="#F97316" stroke-width="1" stroke-opacity="0.1"/>
  <text x="230" y="145" font-family="DM Sans, sans-serif" font-size="14" font-weight="600" fill="#1C1917">Growth Overview</text>
  <!-- Curved chart line -->
  <path d="M230 310 Q280 290 330 295 T430 250 T530 220" stroke="#F97316" stroke-width="2.5" fill="none"/>
  <path d="M230 310 Q280 290 330 295 T430 250 T530 220 L530 370 L230 370 Z" fill="#F97316" opacity="0.06"/>
  <!-- Wavy divider in chart -->
  <path d="M230 370 Q330 360 430 370 T530 370" stroke="#F97316" stroke-width="1" opacity="0.2" fill="none"/>
  <!-- Activity panel -->
  <rect x="600" y="110" width="180" height="320" rx="24" fill="#FFFFFF" stroke="#8B5CF6" stroke-width="1" stroke-opacity="0.1"/>
  <text x="620" y="145" font-family="DM Sans, sans-serif" font-size="13" font-weight="600" fill="#1C1917">Activity</text>
  <circle cx="620" cy="175" r="5" fill="#F97316"/>
  <text x="635" y="179" font-family="DM Sans, sans-serif" font-size="11" fill="#1C1917" opacity="0.5">New order</text>
  <circle cx="620" cy="205" r="5" fill="#8B5CF6"/>
  <text x="635" y="209" font-family="DM Sans, sans-serif" font-size="11" fill="#1C1917" opacity="0.5">User joined</text>
  <circle cx="620" cy="235" r="5" fill="#22D3EE"/>
  <text x="635" y="239" font-family="DM Sans, sans-serif" font-size="11" fill="#1C1917" opacity="0.5">Review posted</text>
  <circle cx="620" cy="265" r="5" fill="#F97316"/>
  <text x="635" y="269" font-family="DM Sans, sans-serif" font-size="11" fill="#1C1917" opacity="0.5">Payment</text>
