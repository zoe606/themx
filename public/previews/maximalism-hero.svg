<svg width="800" height="450" viewBox="0 0 800 450" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#FFF7ED"/>
  <!-- Background patterns and shapes -->
  <circle cx="700" cy="80" r="60" fill="#F97316" fill-opacity="0.2"/>
  <circle cx="720" cy="90" r="40" fill="#E11D48" fill-opacity="0.15"/>
  <rect x="50" y="350" width="80" height="80" fill="#7C3AED" fill-opacity="0.15" transform="rotate(15 90 390)"/>
  <circle cx="150" cy="400" r="50" fill="#F97316" fill-opacity="0.1"/>
  <!-- Squiggle decoration -->
  <path d="M600 300 Q620 280 640 300 Q660 320 680 300 Q700 280 720 300" stroke="#E11D48" stroke-width="3" fill="none"/>
  <path d="M30 150 Q50 130 70 150 Q90 170 110 150" stroke="#7C3AED" stroke-width="3" fill="none"/>
  <!-- Stars -->
  <polygon points="680,180 685,195 700,195 688,204 692,220 680,210 668,220 672,204 660,195 675,195" fill="#F97316"/>
  <polygon points="120,80 123,90 133,90 125,96 128,106 120,100 112,106 115,96 107,90 117,90" fill="#E11D48"/>
  <!-- Main heading — large and chaotic -->
  <text x="80" y="130" font-family="Archivo Black, sans-serif" font-size="72" font-weight="900" fill="#E11D48">MORE IS</text>
  <text x="80" y="210" font-family="Archivo Black, sans-serif" font-size="72" font-weight="900" fill="#7C3AED">MORE.</text>
  <!-- Subtitle in different style -->
  <text x="85" y="250" font-family="DM Sans, sans-serif" font-size="18" fill="#1C1917">And then some. Embrace the beautiful excess.</text>
  <!-- Overlapping buttons -->
  <rect x="80" y="280" width="200" height="50" rx="0" fill="#E11D48"/>
  <text x="180" y="312" font-family="Archivo Black, sans-serif" font-size="16" fill="#FFFFFF" text-anchor="middle">DIVE IN</text>
  <rect x="250" y="290" width="160" height="50" rx="25" fill="#7C3AED"/>
  <text x="330" y="322" font-family="DM Sans, sans-serif" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">EXPLORE</text>
  <rect x="380" y="275" width="120" height="40" fill="#F97316" transform="rotate(-3 440 295)"/>
  <text x="440" y="300" font-family="Archivo Black, sans-serif" font-size="12" fill="#FFFFFF" text-anchor="middle">WHY NOT?</text>
  <!-- Underline decoration -->
  <path d="M80 218 Q200 230 400 215" stroke="#F97316" stroke-width="4" fill="none"/>
  <!-- Arrow decoration -->
  <line x1="500" y1="200" x2="600" y2="160" stroke="#1C1917" stroke-width="2"/>
  <polygon points="600,160 590,165 595,155" fill="#1C1917"/>
  <!-- Zigzag bottom -->
  <path d="M0 430 L20 410 L40 430 L60 410 L80 430 L100 410 L120 430 L140 410 L160 430 L180 410 L200 430 L220 410 L240 430 L260 410 L280 430 L300 410 L320 430 L340 410 L360 430 L380 410 L400 430 L420 410 L440 430 L460 410 L480 430 L500 410 L520 430 L540 410 L560 430 L580 410 L600 430 L620 410 L640 430 L660 410 L680 430 L700 410 L720 430 L740 410 L760 430 L780 410 L800 430" stroke="#E11D48" stroke-width="2" fill="none"/>
</svg>