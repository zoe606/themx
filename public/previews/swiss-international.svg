<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <rect width="800" height="600" fill="#FFFFFF"/>
  <!-- Grid lines -->
  <line x1="200" y1="0" x2="200" y2="600" stroke="#E5E5E5" stroke-width="0.5"/>
  <line x1="400" y1="0" x2="400" y2="600" stroke="#E5E5E5" stroke-width="0.5"/>
  <line x1="600" y1="0" x2="600" y2="600" stroke="#E5E5E5" stroke-width="0.5"/>
  <!-- Large headline -->
  <text x="60" y="120" font-family="Helvetica, Arial, sans-serif" font-size="72" font-weight="bold" fill="#000000">Swiss</text>
  <text x="60" y="190" font-family="Helvetica, Arial, sans-serif" font-size="72" font-weight="bold" fill="#000000">Design</text>
  <!-- Red accent block -->
  <rect x="60" y="220" width="80" height="8" fill="#FF0000"/>
  <!-- Body text lines -->
  <rect x="60" y="260" width="300" height="8" fill="#1A1A1A" opacity="0.6"/>
  <rect x="60" y="280" width="280" height="8" fill="#1A1A1A" opacity="0.6"/>
  <rect x="60" y="300" width="310" height="8" fill="#1A1A1A" opacity="0.6"/>
  <rect x="60" y="320" width="250" height="8" fill="#1A1A1A" opacity="0.6"/>
  <!-- Right column image placeholder -->
  <rect x="420" y="60" width="320" height="400" fill="#000000"/>
  <text x="580" y="270" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#FFFFFF">PHOTOGRAPH</text>
  <!-- Blue accent -->
  <rect x="420" y="490" width="160" height="4" fill="#0057B7"/>
  <!-- Bottom info -->
  <text x="60" y="520" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#1A1A1A" letter-spacing="2">THE GRID IS EVERYTHING</text>
  <text x="60" y="560" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#1A1A1A" opacity="0.5">International Typographic Style / 2024</text>
</svg>
