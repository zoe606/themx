<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <rect width="800" height="600" fill="#FFF7ED"/>
  <!-- Background pattern elements -->
  <circle cx="100" cy="100" r="60" fill="#F97316" opacity="0.2"/>
  <circle cx="700" cy="500" r="80" fill="#7C3AED" opacity="0.15"/>
  <rect x="600" y="50" width="100" height="100" fill="#E11D48" opacity="0.1" transform="rotate(15 650 100)"/>
  <!-- Zigzag decoration -->
  <polyline points="0,300 40,270 80,300 120,270 160,300 200,270 240,300 280,270 320,300 360,270 400,300" fill="none" stroke="#F97316" stroke-width="3" opacity="0.3"/>
  <!-- Oversized heading -->
  <text x="50" y="160" font-family="sans-serif" font-size="80" font-weight="900" fill="#E11D48">MAX</text>
  <text x="280" y="160" font-family="serif" font-size="80" font-style="italic" fill="#7C3AED">imal</text>
  <text x="50" y="240" font-family="sans-serif" font-size="80" font-weight="900" fill="#1C1917">ISM!</text>
  <!-- Layered shapes -->
  <rect x="500" y="150" width="250" height="180" fill="#E11D48" transform="rotate(-5 625 240)"/>
  <rect x="520" y="170" width="250" height="180" fill="#7C3AED" transform="rotate(3 645 260)"/>
  <text x="640" y="270" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">MORE IS MORE</text>
  <!-- Scattered decorative elements -->
  <circle cx="450" cy="420" r="40" fill="#F97316"/>
  <polygon points="200,400 230,450 170,450" fill="#E11D48"/>
  <rect x="300" y="380" width="80" height="80" fill="#7C3AED" opacity="0.8" transform="rotate(20 340 420)"/>
  <!-- Mixed text -->
  <text x="50" y="380" font-family="sans-serif" font-size="14" fill="#1C1917">Layered textures and patterns</text>
  <text x="50" y="420" font-family="serif" font-size="28" font-weight="bold" fill="#E11D48">Bold &amp; Expressive</text>
  <text x="50" y="480" font-family="monospace" font-size="12" fill="#7C3AED">multiple competing visual elements</text>
  <!-- Star decorations -->
  <text x="460" y="100" font-size="40" fill="#F97316">&#9733;</text>
  <text x="160" y="520" font-size="30" fill="#E11D48">&#9733;</text>
  <text x="600" y="400" font-size="24" fill="#7C3AED">&#9733;</text>
  <!-- Bottom stripe -->
  <rect x="0" y="550" width="800" height="20" fill="#E11D48"/>
  <rect x="0" y="570" width="800" height="15" fill="#7C3AED"/>
  <rect x="0" y="585" width="800" height="15" fill="#F97316"/>
</svg>
