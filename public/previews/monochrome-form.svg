<svg width="800" height="450" viewBox="0 0 800 450" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#FFFFFF"/>
  <!-- Form container -->
  <rect x="220" y="20" width="360" height="410" fill="#FFFFFF" stroke="#111111" stroke-width="2"/>
  <!-- Header -->
  <text x="400" y="65" text-anchor="middle" font-family="Georgia, serif" font-size="32" font-weight="700" fill="#111111">Sign In</text>
  <line x1="260" y1="80" x2="540" y2="80" stroke="#111111" stroke-width="2"/>
  <text x="400" y="105" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#666666">Welcome back</text>
  <!-- Email field -->
  <text x="260" y="145" font-family="sans-serif" font-size="11" font-weight="600" fill="#111111">EMAIL</text>
  <rect x="260" y="155" width="280" height="44" fill="#FFFFFF" stroke="#111111" stroke-width="1.5"/>
  <text x="280" y="182" font-family="sans-serif" font-size="13" fill="#999999">you@example.com</text>
  <!-- Password field -->
  <text x="260" y="225" font-family="sans-serif" font-size="11" font-weight="600" fill="#111111">PASSWORD</text>
  <rect x="260" y="235" width="280" height="44" fill="#FFFFFF" stroke="#111111" stroke-width="1.5"/>
  <text x="280" y="262" font-family="sans-serif" font-size="13" fill="#999999">Enter password</text>
  <!-- Forgot password -->
  <text x="540" y="305" text-anchor="end" font-family="sans-serif" font-size="12" fill="#111111" text-decoration="underline">Forgot password?</text>
  <!-- Submit -->
  <rect x="260" y="325" width="280" height="46" fill="#111111"/>
  <text x="400" y="353" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="600" fill="#FFFFFF">Sign In</text>
  <!-- Divider -->
  <line x1="260" y1="390" x2="345" y2="390" stroke="#999999" stroke-width="1"/>
  <text x="400" y="394" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#999999">or</text>
  <line x1="455" y1="390" x2="540" y2="390" stroke="#999999" stroke-width="1"/>
  <!-- Sign up -->
  <text x="400" y="420" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#666666">New? <tspan fill="#111111" font-weight="600">Create account</tspan></text>
</svg>
