<svg width="800" height="450" viewBox="0 0 800 450" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#FFFFFF"/>
  <!-- Form container -->
  <rect x="200" y="20" width="400" height="410" fill="#FFFFFF" stroke="#000000" stroke-width="2"/>
  <!-- Header -->
  <text x="400" y="70" text-anchor="middle" font-family="sans-serif" font-size="36" font-weight="900" fill="#000000">LOG</text>
  <text x="400" y="110" text-anchor="middle" font-family="sans-serif" font-size="36" font-weight="100" fill="#111111"><tspan fill="#FF3366" font-weight="900">IN</tspan>.</text>
  <line x1="240" y1="125" x2="560" y2="125" stroke="#000000" stroke-width="1"/>
  <!-- Email field -->
  <text x="240" y="165" font-family="sans-serif" font-size="11" font-weight="700" fill="#111111" letter-spacing="2">EMAIL</text>
  <rect x="240" y="175" width="320" height="44" fill="none" stroke="#000000" stroke-width="1.5"/>
  <text x="260" y="202" font-family="sans-serif" font-size="14" font-weight="300" fill="#111111" opacity="0.3">you@example.com</text>
  <!-- Password field -->
  <text x="240" y="248" font-family="sans-serif" font-size="11" font-weight="700" fill="#111111" letter-spacing="2">PASSWORD</text>
  <rect x="240" y="258" width="320" height="44" fill="none" stroke="#000000" stroke-width="1.5"/>
  <text x="260" y="285" font-family="sans-serif" font-size="14" font-weight="300" fill="#111111" opacity="0.3">Enter password</text>
  <!-- Forgot link -->
  <text x="560" y="325" text-anchor="end" font-family="sans-serif" font-size="12" font-weight="700" fill="#FF3366">FORGOT?</text>
  <!-- Submit -->
  <rect x="240" y="345" width="320" height="46" fill="#000000"/>
  <text x="400" y="373" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="900" fill="#FFFFFF">ENTER</text>
  <!-- Footer -->
  <text x="400" y="415" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="300" fill="#111111">No account? <tspan font-weight="700" fill="#3366FF">Sign up</tspan></text>
</svg>
