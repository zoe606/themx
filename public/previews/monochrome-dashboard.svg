<svg width="800" height="450" viewBox="0 0 800 450" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#FFFFFF"/>
  <!-- Sidebar -->
  <rect x="0" y="0" width="180" height="450" fill="#111111"/>
  <text x="90" y="35" text-anchor="middle" font-family="Georgia, serif" font-size="16" font-weight="700" fill="#FFFFFF">Mono</text>
  <line x1="20" y1="50" x2="160" y2="50" stroke="#FFFFFF" stroke-width="1" opacity="0.2"/>
  <rect x="10" y="62" width="160" height="32" fill="#FFFFFF" opacity="0.1"/>
  <text x="90" y="83" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="600" fill="#FFFFFF">Dashboard</text>
  <text x="90" y="118" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#FFFFFF" opacity="0.4">Analytics</text>
  <text x="90" y="148" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#FFFFFF" opacity="0.4">Content</text>
  <text x="90" y="178" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#FFFFFF" opacity="0.4">Settings</text>
  <!-- Top stat cards -->
  <rect x="200" y="15" width="185" height="80" fill="#FFFFFF" stroke="#111111" stroke-width="2"/>
  <text x="292" y="48" text-anchor="middle" font-family="Georgia, serif" font-size="26" font-weight="700" fill="#111111">3,241</text>
  <text x="292" y="72" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#666666">Visitors</text>
  <rect x="400" y="15" width="185" height="80" fill="#111111"/>
  <text x="492" y="48" text-anchor="middle" font-family="Georgia, serif" font-size="26" font-weight="700" fill="#FFFFFF">847</text>
  <text x="492" y="72" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#FFFFFF" opacity="0.6">Subscribers</text>
  <rect x="600" y="15" width="180" height="80" fill="#FFFFFF" stroke="#111111" stroke-width="2"/>
  <text x="690" y="48" text-anchor="middle" font-family="Georgia, serif" font-size="26" font-weight="700" fill="#111111">94%</text>
  <text x="690" y="72" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#666666">Retention</text>
  <!-- Main chart -->
  <rect x="200" y="110" width="385" height="325" fill="#FFFFFF" stroke="#111111" stroke-width="2"/>
  <text x="225" y="140" font-family="Georgia, serif" font-size="14" font-weight="700" fill="#111111">Weekly Traffic</text>
  <line x1="225" y1="150" x2="560" y2="150" stroke="#111111" stroke-width="1"/>
  <!-- Chart bars -->
  <rect x="245" y="180" width="36" height="150" fill="#111111"/>
  <rect x="300" y="200" width="36" height="130" fill="#666666"/>
  <rect x="355" y="175" width="36" height="155" fill="#111111"/>
  <rect x="410" y="210" width="36" height="120" fill="#999999"/>
  <rect x="465" y="190" width="36" height="140" fill="#111111"/>
  <rect x="520" y="220" width="36" height="110" fill="#666666"/>
  <!-- Labels -->
  <text x="263" y="350" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#666666">Mon</text>
  <text x="318" y="350" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#666666">Tue</text>
  <text x="373" y="350" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#666666">Wed</text>
  <text x="428" y="350" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#666666">Thu</text>
  <text x="483" y="350" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#666666">Fri</text>
  <text x="538" y="350" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#666666">Sat</text>
  <!-- Right panel -->
  <rect x="600" y="110" width="180" height="325" fill="#FFFFFF" stroke="#111111" stroke-width="2"/>
  <text x="620" y="140" font-family="Georgia, serif" font-size="13" font-weight="700" fill="#111111">Recent</text>
  <line x1="620" y1="150" x2="760" y2="150" stroke="#111111" stroke-width="1"/>
  <text x="620" y="178" font-family="Georgia, serif" font-size="22" font-weight="700" fill="#111111">01</text>
  <text x="655" y="174" font-family="sans-serif" font-size="11" fill="#666666">New article</text>
  <line x1="620" y1="192" x2="760" y2="192" stroke="#999999" stroke-width="0.5"/>
  <text x="620" y="218" font-family="Georgia, serif" font-size="22" font-weight="700" fill="#111111">02</text>
  <text x="655" y="214" font-family="sans-serif" font-size="11" fill="#666666">Subscriber</text>
  <line x1="620" y1="232" x2="760" y2="232" stroke="#999999" stroke-width="0.5"/>
  <text x="620" y="258" font-family="Georgia, serif" font-size="22" font-weight="700" fill="#111111">03</text>
  <text x="655" y="254" font-family="sans-serif" font-size="11" fill="#666666">Comment</text>
