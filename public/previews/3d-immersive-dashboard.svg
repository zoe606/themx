<svg width="800" height="450" viewBox="0 0 800 450" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="3dd-bg" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
    <linearGradient id="3dd-border" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366F1" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#A855F7" stop-opacity="0.2"/>
    </linearGradient>
    <filter id="3dd-shadow">
      <feDropShadow dx="3" dy="6" stdDeviation="8" flood-color="#6366F1" flood-opacity="0.15"/>
    </filter>
  </defs>
  <rect width="800" height="450" fill="url(#3dd-bg)"/>
  <circle cx="100" cy="100" r="150" fill="#6366F1" opacity="0.03"/>
  <circle cx="700" cy="350" r="150" fill="#A855F7" opacity="0.03"/>
  <!-- Sidebar -->
  <rect x="0" y="0" width="180" height="450" fill="#0F172A" stroke="#6366F1" stroke-width="1" stroke-opacity="0.15"/>
  <text x="90" y="35" text-anchor="middle" font-family="Space Grotesk, sans-serif" font-size="16" font-weight="700" fill="#E2E8F0">Spatial</text>
  <rect x="12" y="55" width="156" height="34" rx="8" fill="#6366F1" opacity="0.15"/>
  <text x="90" y="77" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="500" fill="#6366F1">Dashboard</text>
  <text x="90" y="115" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" fill="#E2E8F0" opacity="0.3">Scenes</text>
  <text x="90" y="145" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" fill="#E2E8F0" opacity="0.3">Objects</text>
  <text x="90" y="175" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" fill="#E2E8F0" opacity="0.3">Settings</text>
  <!-- Stat cards -->
  <rect x="200" y="15" width="185" height="80" rx="12" fill="#0F172A" stroke="url(#3dd-border)" stroke-width="1" filter="url(#3dd-shadow)"/>
  <text x="292" y="48" text-anchor="middle" font-family="Space Grotesk, sans-serif" font-size="22" font-weight="700" fill="#6366F1">1.2k</text>
  <text x="292" y="70" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#E2E8F0" opacity="0.35">Renders</text>
  <rect x="400" y="15" width="185" height="80" rx="12" fill="#0F172A" stroke="url(#3dd-border)" stroke-width="1" filter="url(#3dd-shadow)"/>
  <text x="492" y="48" text-anchor="middle" font-family="Space Grotesk, sans-serif" font-size="22" font-weight="700" fill="#A855F7">847</text>
  <text x="492" y="70" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#E2E8F0" opacity="0.35">Objects</text>
  <rect x="600" y="15" width="180" height="80" rx="12" fill="#0F172A" stroke="url(#3dd-border)" stroke-width="1" filter="url(#3dd-shadow)"/>
  <text x="690" y="48" text-anchor="middle" font-family="Space Grotesk, sans-serif" font-size="22" font-weight="700" fill="#F43F5E">60fps</text>
  <text x="690" y="70" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#E2E8F0" opacity="0.35">Frame Rate</text>
  <!-- Chart panel -->
  <rect x="200" y="110" width="380" height="320" rx="12" fill="#0F172A" stroke="url(#3dd-border)" stroke-width="1" filter="url(#3dd-shadow)"/>
  <text x="225" y="140" font-family="Space Grotesk, sans-serif" font-size="14" font-weight="600" fill="#E2E8F0">Render Performance</text>
  <!-- Chart -->
  <polyline points="230,310 280,280 330,290 380,240 430,250 480,200 530,220" stroke="#6366F1" stroke-width="2.5" fill="none"/>
  <polygon points="230,310 280,280 330,290 380,240 430,250 480,200 530,220 530,370 230,370" fill="#6366F1" opacity="0.06"/>
  <polyline points="230,330 280,310 330,318 380,290 430,300 480,265 530,275" stroke="#A855F7" stroke-width="1.5" fill="none" opacity="0.4"/>
  <!-- Grid lines -->
  <line x1="230" y1="370" x2="545" y2="370" stroke="#E2E8F0" stroke-width="0.3" opacity="0.1"/>
  <line x1="230" y1="310" x2="545" y2="310" stroke="#E2E8F0" stroke-width="0.3" opacity="0.1"/>
  <line x1="230" y1="250" x2="545" y2="250" stroke="#E2E8F0" stroke-width="0.3" opacity="0.1"/>
  <!-- Activity panel -->
  <rect x="600" y="110" width="180" height="320" rx="12" fill="#0F172A" stroke="url(#3dd-border)" stroke-width="1" filter="url(#3dd-shadow)"/>
  <text x="620" y="140" font-family="Space Grotesk, sans-serif" font-size="13" font-weight="600" fill="#E2E8F0">Scene Log</text>
  <circle cx="620" cy="170" r="4" fill="#6366F1"/>
  <text x="635" y="174" font-family="Inter, sans-serif" font-size="11" fill="#E2E8F0" opacity="0.35">Mesh loaded</text>
  <circle cx="620" cy="200" r="4" fill="#A855F7"/>
  <text x="635" y="204" font-family="Inter, sans-serif" font-size="11" fill="#E2E8F0" opacity="0.35">Texture applied</text>
  <circle cx="620" cy="230" r="4" fill="#F43F5E"/>
  <text x="635" y="234" font-family="Inter, sans-serif" font-size="11" fill="#E2E8F0" opacity="0.35">Light updated</text>
  <circle cx="620" cy="260" r="4" fill="#6366F1"/>
  <text x="635" y="264" font-family="Inter, sans-serif" font-size="11" fill="#E2E8F0" opacity="0.35">Scene render</text>
</svg>
