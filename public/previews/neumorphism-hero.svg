<svg width="800" height="450" viewBox="0 0 800 450" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="nh-outer" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="6" dy="6" stdDeviation="10" flood-color="#B8BEC7" flood-opacity="0.8"/>
      <feDropShadow dx="-6" dy="-6" stdDeviation="10" flood-color="#FFFFFF" flood-opacity="0.9"/>
    </filter>
    <filter id="nh-pressed" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="3" dy="3" stdDeviation="5" flood-color="#B8BEC7" flood-opacity="0.6"/>
      <feDropShadow dx="-3" dy="-3" stdDeviation="5" flood-color="#FFFFFF" flood-opacity="0.7"/>
    </filter>
  </defs>
  <rect width="800" height="450" fill="#E0E5EC"/>
  <!-- Hero heading -->
  <text x="60" y="100" font-family="Poppins, sans-serif" font-size="48" font-weight="700" fill="#44476A">Soft UI That</text>
  <text x="60" y="160" font-family="Poppins, sans-serif" font-size="48" font-weight="700" fill="#6C63FF">Feels Real</text>
  <!-- Subtitle -->
  <text x="60" y="205" font-family="Rubik, sans-serif" font-size="18" fill="#44476A" opacity="0.7">Elements float above a monochromatic surface,</text>
  <text x="60" y="230" font-family="Rubik, sans-serif" font-size="18" fill="#44476A" opacity="0.7">defined by light and shadow alone.</text>
  <!-- CTA buttons -->
  <rect x="60" y="265" width="200" height="56" rx="16" fill="#E0E5EC" filter="url(#nh-outer)"/>
  <text x="160" y="299" text-anchor="middle" font-family="Poppins, sans-serif" font-size="17" font-weight="600" fill="#6C63FF">Get Started</text>
  <rect x="290" y="265" width="180" height="56" rx="16" fill="#E0E5EC" filter="url(#nh-pressed)"/>
  <text x="380" y="299" text-anchor="middle" font-family="Poppins, sans-serif" font-size="17" font-weight="500" fill="#44476A">Learn More</text>
  <!-- Decorative circles -->
  <circle cx="650" cy="120" r="70" fill="#E0E5EC" filter="url(#nh-outer)"/>
  <circle cx="650" cy="120" r="35" fill="#6C63FF" opacity="0.5"/>
  <circle cx="700" cy="260" r="50" fill="#E0E5EC" filter="url(#nh-outer)"/>
  <circle cx="700" cy="260" r="25" fill="#A8A4FF" opacity="0.5"/>
  <!-- Bottom bar -->
  <rect x="60" y="370" width="680" height="50" rx="14" fill="#E0E5EC" filter="url(#nh-outer)"/>
  <rect x="80" y="385" width="200" height="20" rx="10" fill="#E0E5EC" filter="url(#nh-pressed)"/>
  <rect x="80" y="385" width="140" height="20" rx="10" fill="#6C63FF" opacity="0.4"/>
  <text x="530" y="400" font-family="Rubik, sans-serif" font-size="13" fill="#44476A" opacity="0.6">Trusted by 10,000+ designers</text>
</svg>
