<svg width="800" height="450" viewBox="0 0 800 450" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="35" text-anchor="middle" font-family="Georgia, serif" font-size="20" font-weight="700" fill="#111111">Selected Work</text>
  <line x1="40" y1="50" x2="760" y2="50" stroke="#111111" stroke-width="2"/>
  <!-- Card 1 -->
  <rect x="40" y="70" width="230" height="340" fill="#FFFFFF" stroke="#111111" stroke-width="2"/>
  <rect x="40" y="70" width="230" height="140" fill="#111111"/>
  <text x="155" y="150" text-anchor="middle" font-family="Georgia, serif" font-size="56" font-weight="700" fill="#FFFFFF">A</text>
  <text x="155" y="240" text-anchor="middle" font-family="Georgia, serif" font-size="18" font-weight="700" fill="#111111">Typography</text>
  <text x="155" y="265" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#666666">Strong hierarchy through</text>
  <text x="155" y="283" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#666666">size and weight.</text>
  <line x1="60" y1="305" x2="250" y2="305" stroke="#111111" stroke-width="1"/>
  <rect x="60" y="330" width="100" height="32" fill="#111111"/>
  <text x="110" y="351" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="600" fill="#FFFFFF">View</text>
  <!-- Card 2 -->
  <rect x="285" y="70" width="230" height="340" fill="#FFFFFF" stroke="#111111" stroke-width="2"/>
  <rect x="285" y="70" width="230" height="140" fill="#666666"/>
  <text x="400" y="150" text-anchor="middle" font-family="Georgia, serif" font-size="56" font-weight="700" fill="#FFFFFF">B</text>
  <text x="400" y="240" text-anchor="middle" font-family="Georgia, serif" font-size="18" font-weight="700" fill="#111111">Contrast</text>
  <text x="400" y="265" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#666666">Bold dividing lines and</text>
  <text x="400" y="283" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#666666">dramatic value shifts.</text>
  <line x1="305" y1="305" x2="495" y2="305" stroke="#111111" stroke-width="1"/>
  <rect x="305" y="330" width="100" height="32" fill="#666666"/>
  <text x="355" y="351" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="600" fill="#FFFFFF">View</text>
  <!-- Card 3 -->
  <rect x="530" y="70" width="230" height="340" fill="#FFFFFF" stroke="#111111" stroke-width="2"/>
  <rect x="530" y="70" width="230" height="140" fill="#999999"/>
  <text x="645" y="150" text-anchor="middle" font-family="Georgia, serif" font-size="56" font-weight="700" fill="#FFFFFF">C</text>
  <text x="645" y="240" text-anchor="middle" font-family="Georgia, serif" font-size="18" font-weight="700" fill="#111111">Restraint</text>
  <text x="645" y="265" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#666666">No color. Depth through</text>
  <text x="645" y="283" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#666666">composition alone.</text>
  <line x1="550" y1="305" x2="740" y2="305" stroke="#111111" stroke-width="1"/>
  <rect x="550" y="330" width="100" height="32" fill="#999999"/>
  <text x="600" y="351" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="600" fill="#FFFFFF">View</text>
</svg>
