<svg width="800" height="450" viewBox="0 0 800 450" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="nf-outer" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="6" dy="6" stdDeviation="10" flood-color="#B8BEC7" flood-opacity="0.8"/>
      <feDropShadow dx="-6" dy="-6" stdDeviation="10" flood-color="#FFFFFF" flood-opacity="0.9"/>
    </filter>
    <filter id="nf-pressed" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="3" dy="3" stdDeviation="5" flood-color="#B8BEC7" flood-opacity="0.6"/>
      <feDropShadow dx="-3" dy="-3" stdDeviation="5" flood-color="#FFFFFF" flood-opacity="0.7"/>
    </filter>
  </defs>
  <rect width="800" height="450" fill="#E0E5EC"/>
  <!-- Form container -->
  <rect x="200" y="30" width="400" height="390" rx="28" fill="#E0E5EC" filter="url(#nf-outer)"/>
  <!-- Avatar circle -->
  <circle cx="400" cy="80" r="30" fill="#E0E5EC" filter="url(#nf-pressed)"/>
  <circle cx="400" cy="80" r="14" fill="#6C63FF"/>
  <text x="400" y="130" text-anchor="middle" font-family="Poppins, sans-serif" font-size="20" font-weight="600" fill="#44476A">Sign In</text>
  <!-- Email field -->
  <text x="240" y="170" font-family="Rubik, sans-serif" font-size="12" fill="#44476A" opacity="0.6">Email</text>
  <rect x="240" y="180" width="320" height="46" rx="14" fill="#E0E5EC" filter="url(#nf-pressed)"/>
  <text x="260" y="208" font-family="Rubik, sans-serif" font-size="14" fill="#44476A" opacity="0.4">you@example.com</text>
  <!-- Password field -->
  <text x="240" y="250" font-family="Rubik, sans-serif" font-size="12" fill="#44476A" opacity="0.6">Password</text>
  <rect x="240" y="260" width="320" height="46" rx="14" fill="#E0E5EC" filter="url(#nf-pressed)"/>
  <text x="260" y="288" font-family="Rubik, sans-serif" font-size="14" fill="#44476A" opacity="0.4">Enter password</text>
  <!-- Sign in button -->
  <rect x="240" y="330" width="320" height="50" rx="16" fill="#E0E5EC" filter="url(#nf-outer)"/>
  <text x="400" y="361" text-anchor="middle" font-family="Poppins, sans-serif" font-size="16" font-weight="600" fill="#6C63FF">Sign In</text>
  <!-- Footer text -->
  <text x="400" y="400" text-anchor="middle" font-family="Rubik, sans-serif" font-size="12" fill="#44476A" opacity="0.5">No account? Sign up</text>
</svg>
