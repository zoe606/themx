<svg width="800" height="450" viewBox="0 0 800 450" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="cph-glow-g">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="cph-glow-p">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="cph-scanlines" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="2" fill="#FFFFFF" opacity="0.02"/>
    </pattern>
  </defs>
  <rect width="800" height="450" fill="#0D0D0D"/>
  <rect width="800" height="450" fill="url(#cph-scanlines)"/>
  <!-- Top border line -->
  <line x1="0" y1="2" x2="800" y2="2" stroke="#00FF41" stroke-width="2" filter="url(#cph-glow-g)"/>
  <!-- Hero text -->
  <text x="60" y="120" font-family="Rajdhani, sans-serif" font-size="64" font-weight="700" fill="#00FF41" filter="url(#cph-glow-g)">JACK INTO</text>
  <text x="60" y="190" font-family="Rajdhani, sans-serif" font-size="64" font-weight="700" fill="#FF0090" filter="url(#cph-glow-p)">THE GRID</text>
  <!-- Subtitle -->
  <text x="60" y="235" font-family="Share Tech Mono, monospace" font-size="16" fill="#C0C0C0">// high_tech.meets(low_life)</text>
  <text x="60" y="260" font-family="Share Tech Mono, monospace" font-size="16" fill="#C0C0C0">// init_sequence: ACTIVE</text>
  <!-- CTA buttons -->
  <rect x="60" y="295" width="200" height="48" fill="none" stroke="#00FF41" stroke-width="2" filter="url(#cph-glow-g)"/>
  <text x="160" y="325" text-anchor="middle" font-family="Rajdhani, sans-serif" font-size="18" font-weight="700" fill="#00FF41">CONNECT</text>
  <rect x="280" y="295" width="200" height="48" fill="none" stroke="#FF0090" stroke-width="2" filter="url(#cph-glow-p)"/>
  <text x="380" y="325" text-anchor="middle" font-family="Rajdhani, sans-serif" font-size="18" font-weight="700" fill="#FF0090">DECRYPT</text>
  <!-- Right side terminal -->
  <rect x="540" y="60" width="230" height="260" fill="none" stroke="#00D4FF" stroke-width="1" opacity="0.5"/>
  <rect x="540" y="60" width="230" height="24" fill="#00D4FF" opacity="0.1"/>
  <text x="555" y="77" font-family="Share Tech Mono, monospace" font-size="11" fill="#00D4FF">TERMINAL v2.077</text>
  <text x="555" y="110" font-family="Share Tech Mono, monospace" font-size="11" fill="#00FF41">&gt; system.boot()</text>
  <text x="555" y="130" font-family="Share Tech Mono, monospace" font-size="11" fill="#C0C0C0">Loading kernel...</text>
  <text x="555" y="150" font-family="Share Tech Mono, monospace" font-size="11" fill="#C0C0C0">Neural link: OK</text>
  <text x="555" y="170" font-family="Share Tech Mono, monospace" font-size="11" fill="#C0C0C0">Crypto vault: SEALED</text>
  <text x="555" y="190" font-family="Share Tech Mono, monospace" font-size="11" fill="#00FF41">&gt; status.check()</text>
  <text x="555" y="210" font-family="Share Tech Mono, monospace" font-size="11" fill="#FF0090">WARNING: Firewall breach</text>
  <text x="555" y="230" font-family="Share Tech Mono, monospace" font-size="11" fill="#C0C0C0">Rerouting traffic...</text>
  <text x="555" y="250" font-family="Share Tech Mono, monospace" font-size="11" fill="#00FF41">&gt; _</text>
  <!-- Bottom decorations -->
  <line x1="60" y1="400" x2="740" y2="400" stroke="#FF0090" stroke-width="1" opacity="0.3"/>
  <text x="60" y="430" font-family="Share Tech Mono, monospace" font-size="11" fill="#C0C0C0" opacity="0.5">NODE::2077 | LAT:51.5074 | LONG:-0.1278 | UPLINK:STABLE</text>
</svg>
