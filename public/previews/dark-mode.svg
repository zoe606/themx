<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <rect width="800" height="600" fill="#121212"/>
  <!-- Top bar -->
  <rect x="0" y="0" width="800" height="60" fill="#1E1E1E"/>
  <text x="40" y="38" font-family="Inter, sans-serif" font-size="20" font-weight="700" fill="#E1E1E1">DarkApp</text>
  <circle cx="740" cy="30" r="16" fill="#2C2C2C"/>
  <text x="740" y="35" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" fill="#BB86FC">U</text>
  <!-- Hero section -->
  <text x="400" y="140" text-anchor="middle" font-family="Inter, sans-serif" font-size="36" font-weight="700" fill="#E1E1E1">Dark Mode</text>
  <text x="400" y="175" text-anchor="middle" font-family="Inter, sans-serif" font-size="16" fill="#9E9E9E">Easy on the eyes, hard to look away</text>
  <!-- Cards -->
  <rect x="40" y="220" width="230" height="160" rx="12" fill="#1E1E1E"/>
  <rect x="40" y="220" width="230" height="4" rx="2" fill="#BB86FC"/>
  <text x="60" y="260" font-family="Inter, sans-serif" font-size="18" font-weight="600" fill="#E1E1E1">Analytics</text>
  <text x="60" y="285" font-family="Inter, sans-serif" font-size="13" fill="#9E9E9E">Track your metrics</text>
  <text x="60" y="355" font-family="Inter, sans-serif" font-size="28" font-weight="700" fill="#BB86FC">2,847</text>
  <rect x="285" y="220" width="230" height="160" rx="12" fill="#1E1E1E"/>
  <rect x="285" y="220" width="230" height="4" rx="2" fill="#03DAC6"/>
  <text x="305" y="260" font-family="Inter, sans-serif" font-size="18" font-weight="600" fill="#E1E1E1">Revenue</text>
  <text x="305" y="285" font-family="Inter, sans-serif" font-size="13" fill="#9E9E9E">Monthly overview</text>
  <text x="305" y="355" font-family="Inter, sans-serif" font-size="28" font-weight="700" fill="#03DAC6">$14.2k</text>
  <rect x="530" y="220" width="230" height="160" rx="12" fill="#1E1E1E"/>
  <rect x="530" y="220" width="230" height="4" rx="2" fill="#CF6679"/>
  <text x="550" y="260" font-family="Inter, sans-serif" font-size="18" font-weight="600" fill="#E1E1E1">Alerts</text>
  <text x="550" y="285" font-family="Inter, sans-serif" font-size="13" fill="#9E9E9E">Action required</text>
  <text x="550" y="355" font-family="Inter, sans-serif" font-size="28" font-weight="700" fill="#CF6679">12</text>
  <!-- Bottom panel -->
  <rect x="40" y="420" width="720" height="140" rx="12" fill="#1E1E1E"/>
  <text x="60" y="460" font-family="Inter, sans-serif" font-size="18" font-weight="600" fill="#E1E1E1">Recent Activity</text>
  <rect x="60" y="480" width="680" height="1" fill="#2C2C2C"/>
  <text x="60" y="510" font-family="Inter, sans-serif" font-size="14" fill="#9E9E9E">System update completed</text>
  <text x="700" y="510" text-anchor="end" font-family="Inter, sans-serif" font-size="12" fill="#BB86FC">2m ago</text>
  <text x="60" y="540" font-family="Inter, sans-serif" font-size="14" fill="#9E9E9E">New user registered</text>
  <text x="700" y="540" text-anchor="end" font-family="Inter, sans-serif" font-size="12" fill="#03DAC6">15m ago</text>
</svg>
