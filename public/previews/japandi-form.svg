<svg width="800" height="450" viewBox="0 0 800 450" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#F5F0EB"/>
  <!-- Organic background shapes -->
  <ellipse cx="150" cy="225" rx="120" ry="180" fill="#8B7355" fill-opacity="0.04"/>
  <ellipse cx="650" cy="225" rx="120" ry="180" fill="#6B8E7B" fill-opacity="0.04"/>
  <!-- Form container -->
  <rect x="225" y="40" width="350" height="370" rx="24" fill="#FFFFFF" fill-opacity="0.5"/>
  <!-- Title -->
  <text x="400" y="90" font-family="Cormorant Garamond, Georgia, serif" font-size="30" fill="#2C2420" text-anchor="middle">Welcome</text>
  <line x1="370" y1="100" x2="430" y2="100" stroke="#C4956A" stroke-width="1" stroke-opacity="0.4"/>
  <text x="400" y="125" font-family="Source Sans 3, sans-serif" font-size="14" fill="#2C2420" fill-opacity="0.5" text-anchor="middle">Sign in to continue</text>
  <!-- Email -->
  <text x="275" y="165" font-family="Source Sans 3, sans-serif" font-size="13" fill="#2C2420" fill-opacity="0.6">Email</text>
  <rect x="270" y="175" width="260" height="44" rx="12" fill="#F5F0EB"/>
  <text x="288" y="202" font-family="Source Sans 3, sans-serif" font-size="14" fill="#2C2420" fill-opacity="0.3">you@example.com</text>
  <!-- Password -->
  <text x="275" y="245" font-family="Source Sans 3, sans-serif" font-size="13" fill="#2C2420" fill-opacity="0.6">Password</text>
  <rect x="270" y="255" width="260" height="44" rx="12" fill="#F5F0EB"/>
  <text x="288" y="282" font-family="Source Sans 3, sans-serif" font-size="14" fill="#2C2420" fill-opacity="0.3">Enter password</text>
  <!-- Submit -->
  <rect x="270" y="322" width="260" height="44" rx="22" fill="#8B7355"/>
  <text x="400" y="350" font-family="Source Sans 3, sans-serif" font-size="15" font-weight="500" fill="#F5F0EB" text-anchor="middle">Sign In</text>
  <!-- Footer -->
  <text x="400" y="394" font-family="Source Sans 3, sans-serif" font-size="13" fill="#2C2420" fill-opacity="0.4" text-anchor="middle">No account? <tspan fill="#8B7355">Create one</tspan></text>
</svg>