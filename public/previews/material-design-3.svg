<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <rect width="800" height="600" fill="#FFFBFE"/>
  <!-- App bar -->
  <rect x="0" y="0" width="800" height="64" fill="#FFFBFE"/>
  <text x="72" y="40" font-family="Roboto, sans-serif" font-size="22" fill="#1C1B1F">Material Design 3</text>
  <circle cx="36" cy="32" r="14" fill="none" stroke="#1C1B1F" stroke-width="1.5"/>
  <!-- FAB -->
  <rect x="700" y="500" width="56" height="56" rx="16" fill="#6750A4"/>
  <line x1="728" y1="516" x2="728" y2="540" stroke="#FFFFFF" stroke-width="2.5"/>
  <line x1="716" y1="528" x2="740" y2="528" stroke="#FFFFFF" stroke-width="2.5"/>
  <!-- Tonal surface cards -->
  <rect x="40" y="90" width="350" height="180" rx="28" fill="#E8DEF8" opacity="0.5"/>
  <text x="70" y="140" font-family="Roboto, sans-serif" font-size="16" font-weight="500" fill="#1C1B1F">Dynamic Color</text>
  <rect x="70" y="160" width="240" height="8" rx="4" fill="#1C1B1F" opacity="0.15"/>
  <rect x="70" y="178" width="200" height="8" rx="4" fill="#1C1B1F" opacity="0.15"/>
  <rect x="70" y="220" width="100" height="36" rx="18" fill="#6750A4"/>
  <text x="120" y="244" text-anchor="middle" font-family="Roboto, sans-serif" font-size="14" fill="#FFFFFF">Filled</text>
  <rect x="190" y="220" width="100" height="36" rx="18" fill="none" stroke="#6750A4" stroke-width="1.5"/>
  <text x="240" y="244" text-anchor="middle" font-family="Roboto, sans-serif" font-size="14" fill="#6750A4">Outlined</text>
  <rect x="410" y="90" width="350" height="180" rx="28" fill="#F2DDE1" opacity="0.5"/>
  <text x="440" y="140" font-family="Roboto, sans-serif" font-size="16" font-weight="500" fill="#1C1B1F">Tonal Surfaces</text>
  <rect x="440" y="160" width="240" height="8" rx="4" fill="#1C1B1F" opacity="0.15"/>
  <rect x="440" y="178" width="200" height="8" rx="4" fill="#1C1B1F" opacity="0.15"/>
  <!-- Chips -->
  <rect x="440" y="220" width="80" height="32" rx="16" fill="#E8DEF8"/>
  <text x="480" y="241" text-anchor="middle" font-family="Roboto, sans-serif" font-size="12" fill="#1C1B1F">Chip 1</text>
  <rect x="530" y="220" width="80" height="32" rx="16" fill="#E8DEF8"/>
  <text x="570" y="241" text-anchor="middle" font-family="Roboto, sans-serif" font-size="12" fill="#1C1B1F">Chip 2</text>
  <!-- Bottom cards -->
  <rect x="40" y="300" width="230" height="260" rx="28" fill="#FFFFFF" stroke="#CAC4D0" stroke-width="1"/>
  <rect x="60" y="320" width="190" height="120" rx="16" fill="#E8DEF8" opacity="0.3"/>
  <rect x="60" y="460" width="160" height="8" rx="4" fill="#1C1B1F" opacity="0.15"/>
  <rect x="60" y="478" width="120" height="8" rx="4" fill="#1C1B1F" opacity="0.1"/>
  <rect x="60" y="516" width="80" height="32" rx="16" fill="#E8DEF8"/>
  <text x="100" y="537" text-anchor="middle" font-family="Roboto, sans-serif" font-size="12" fill="#6750A4">Action</text>
  <rect x="285" y="300" width="230" height="260" rx="28" fill="#FFFFFF" stroke="#CAC4D0" stroke-width="1"/>
  <rect x="305" y="320" width="190" height="120" rx="16" fill="#F2DDE1" opacity="0.3"/>
  <rect x="305" y="460" width="160" height="8" rx="4" fill="#1C1B1F" opacity="0.15"/>
  <rect x="305" y="478" width="120" height="8" rx="4" fill="#1C1B1F" opacity="0.1"/>
  <rect x="530" y="300" width="230" height="260" rx="28" fill="#FFFFFF" stroke="#CAC4D0" stroke-width="1"/>
  <rect x="550" y="320" width="190" height="120" rx="16" fill="#625B71" opacity="0.1"/>
  <rect x="550" y="460" width="160" height="8" rx="4" fill="#1C1B1F" opacity="0.15"/>
  <rect x="550" y="478" width="120" height="8" rx="4" fill="#1C1B1F" opacity="0.1"/>
