<svg width="800" height="450" viewBox="0 0 800 450" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#FFFBFE"/>
  <text x="400" y="40" font-family="Roboto, sans-serif" font-size="22" font-weight="400" fill="#1C1B1F" text-anchor="middle">Features</text>
  <!-- Card 1 - Elevated card -->
  <rect x="50" y="70" width="220" height="320" rx="16" fill="#FFFBFE" stroke="#1C1B1F" stroke-opacity="0.05" stroke-width="1"/>
  <rect x="50" y="70" width="220" height="100" rx="16" fill="#6750A4" fill-opacity="0.08"/>
  <rect x="50" y="140" width="220" height="30" fill="#6750A4" fill-opacity="0.08"/>
  <circle cx="160" cy="120" r="24" fill="#6750A4" fill-opacity="0.15"/>
  <text x="160" y="200" font-family="Roboto, sans-serif" font-size="18" font-weight="500" fill="#1C1B1F" text-anchor="middle">Fast Setup</text>
  <text x="160" y="228" font-family="Roboto, sans-serif" font-size="13" fill="#1C1B1F" fill-opacity="0.6" text-anchor="middle">Get running in minutes</text>
  <text x="160" y="248" font-family="Roboto, sans-serif" font-size="13" fill="#1C1B1F" fill-opacity="0.6" text-anchor="middle">with zero config.</text>
  <rect x="105" y="310" width="110" height="36" rx="18" fill="#6750A4"/>
  <text x="160" y="334" font-family="Roboto, sans-serif" font-size="13" font-weight="500" fill="#FFFFFF" text-anchor="middle">Read More</text>
  <!-- Card 2 -->
  <rect x="290" y="70" width="220" height="320" rx="16" fill="#FFFBFE" stroke="#1C1B1F" stroke-opacity="0.05" stroke-width="1"/>
  <rect x="290" y="70" width="220" height="100" rx="16" fill="#625B71" fill-opacity="0.08"/>
  <rect x="290" y="140" width="220" height="30" fill="#625B71" fill-opacity="0.08"/>
  <circle cx="400" cy="120" r="24" fill="#625B71" fill-opacity="0.15"/>
  <text x="400" y="200" font-family="Roboto, sans-serif" font-size="18" font-weight="500" fill="#1C1B1F" text-anchor="middle">Customizable</text>
  <text x="400" y="228" font-family="Roboto, sans-serif" font-size="13" fill="#1C1B1F" fill-opacity="0.6" text-anchor="middle">Dynamic color theming</text>
  <text x="400" y="248" font-family="Roboto, sans-serif" font-size="13" fill="#1C1B1F" fill-opacity="0.6" text-anchor="middle">adapts to your brand.</text>
  <rect x="345" y="310" width="110" height="36" rx="18" fill="#625B71"/>
  <text x="400" y="334" font-family="Roboto, sans-serif" font-size="13" font-weight="500" fill="#FFFFFF" text-anchor="middle">Read More</text>
  <!-- Card 3 -->
  <rect x="530" y="70" width="220" height="320" rx="16" fill="#FFFBFE" stroke="#1C1B1F" stroke-opacity="0.05" stroke-width="1"/>
  <rect x="530" y="70" width="220" height="100" rx="16" fill="#7D5260" fill-opacity="0.08"/>
  <rect x="530" y="140" width="220" height="30" fill="#7D5260" fill-opacity="0.08"/>
  <circle cx="640" cy="120" r="24" fill="#7D5260" fill-opacity="0.15"/>
  <text x="640" y="200" font-family="Roboto, sans-serif" font-size="18" font-weight="500" fill="#1C1B1F" text-anchor="middle">Accessible</text>
  <text x="640" y="228" font-family="Roboto, sans-serif" font-size="13" fill="#1C1B1F" fill-opacity="0.6" text-anchor="middle">WCAG AA compliant</text>
  <text x="640" y="248" font-family="Roboto, sans-serif" font-size="13" fill="#1C1B1F" fill-opacity="0.6" text-anchor="middle">contrast ratios built in.</text>
  <rect x="585" y="310" width="110" height="36" rx="18" fill="#7D5260"/>
  <text x="640" y="334" font-family="Roboto, sans-serif" font-size="13" font-weight="500" fill="#FFFFFF" text-anchor="middle">Read More</text>
  <!-- Bottom chip row -->
  <rect x="300" y="410" width="200" height="28" rx="14" fill="#6750A4" fill-opacity="0.06"/>
  <text x="400" y="429" font-family="Roboto, sans-serif" font-size="11" fill="#6750A4" text-anchor="middle">Material Design 3</text>
</svg>