<svg width="800" height="450" viewBox="0 0 800 450" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#FAFAFA"/>
  <!-- Large hero card -->
  <rect x="40" y="30" width="480" height="260" rx="16" fill="#FFFFFF"/>
  <text x="80" y="90" font-family="Inter, sans-serif" font-size="40" font-weight="700" fill="#18181B">Everything in its</text>
  <text x="80" y="140" font-family="Inter, sans-serif" font-size="40" font-weight="700" fill="#3B82F6">perfect little box.</text>
  <text x="80" y="185" font-family="Inter, sans-serif" font-size="16" fill="#18181B" fill-opacity="0.6">Modular layouts that make complex information</text>
  <text x="80" y="207" font-family="Inter, sans-serif" font-size="16" fill="#18181B" fill-opacity="0.6">feel approachable and scannable.</text>
  <rect x="80" y="235" width="140" height="40" rx="10" fill="#18181B"/>
  <text x="150" y="261" font-family="Inter, sans-serif" font-size="14" font-weight="500" fill="#FFFFFF" text-anchor="middle">Get Started</text>
  <rect x="236" y="235" width="100" height="40" rx="10" fill="#FAFAFA"/>
  <text x="286" y="261" font-family="Inter, sans-serif" font-size="14" font-weight="500" fill="#18181B" text-anchor="middle">Docs</text>
  <!-- Right side bento cells -->
  <rect x="540" y="30" width="220" height="120" rx="14" fill="#3B82F6"/>
  <text x="650" y="80" font-family="Inter, sans-serif" font-size="36" font-weight="700" fill="#FFFFFF" text-anchor="middle">15+</text>
  <text x="650" y="108" font-family="Inter, sans-serif" font-size="14" fill="#FFFFFF" fill-opacity="0.8" text-anchor="middle">Theme Styles</text>
  <rect x="540" y="166" width="105" height="124" rx="14" fill="#F59E0B"/>
  <text x="592" y="218" font-family="Inter, sans-serif" font-size="28" font-weight="700" fill="#18181B" text-anchor="middle">4px</text>
  <text x="592" y="244" font-family="Inter, sans-serif" font-size="12" fill="#18181B" fill-opacity="0.7" text-anchor="middle">Grid System</text>
  <rect x="660" y="166" width="100" height="124" rx="14" fill="#FFFFFF"/>
  <text x="710" y="218" font-family="Inter, sans-serif" font-size="28" font-weight="700" fill="#18181B" text-anchor="middle">A11y</text>
  <text x="710" y="244" font-family="Inter, sans-serif" font-size="12" fill="#18181B" fill-opacity="0.5" text-anchor="middle">Accessible</text>
  <!-- Bottom row -->
  <rect x="40" y="306" width="240" height="110" rx="14" fill="#FFFFFF"/>
  <text x="70" y="350" font-family="Inter, sans-serif" font-size="16" font-weight="600" fill="#18181B">Open Source</text>
  <text x="70" y="374" font-family="Inter, sans-serif" font-size="13" fill="#18181B" fill-opacity="0.5">MIT Licensed, free forever</text>
  <rect x="296" y="306" width="224" height="110" rx="14" fill="#18181B"/>
  <text x="326" y="350" font-family="Inter, sans-serif" font-size="16" font-weight="600" fill="#FFFFFF">Customizable</text>
  <text x="326" y="374" font-family="Inter, sans-serif" font-size="13" fill="#FFFFFF" fill-opacity="0.6">Tailored to your brand</text>
  <rect x="536" y="306" width="224" height="110" rx="14" fill="#FFFFFF"/>
  <text x="566" y="350" font-family="Inter, sans-serif" font-size="16" font-weight="600" fill="#18181B">Responsive</text>
  <text x="566" y="374" font-family="Inter, sans-serif" font-size="13" fill="#18181B" fill-opacity="0.5">Looks great everywhere</text>
