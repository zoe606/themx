<svg width="800" height="450" viewBox="0 0 800 450" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#FFFBFE"/>
  <!-- Tonal surface background -->
  <rect x="0" y="0" width="800" height="200" fill="#6750A4" fill-opacity="0.05"/>
  <!-- Heading -->
  <text x="400" y="120" font-family="Roboto, sans-serif" font-size="48" font-weight="400" fill="#1C1B1F" text-anchor="middle">Design with Purpose</text>
  <text x="400" y="165" font-family="Roboto, sans-serif" font-size="18" fill="#1C1B1F" fill-opacity="0.7" text-anchor="middle">Material Design 3 brings dynamic color, adaptive layouts, and</text>
  <text x="400" y="190" font-family="Roboto, sans-serif" font-size="18" fill="#1C1B1F" fill-opacity="0.7" text-anchor="middle">updated components to your projects.</text>
  <!-- CTA buttons - fully rounded (M3 style) -->
  <rect x="280" y="220" width="140" height="44" rx="22" fill="#6750A4"/>
  <text x="350" y="248" font-family="Roboto, sans-serif" font-size="14" font-weight="500" fill="#FFFFFF" text-anchor="middle">Get Started</text>
  <rect x="436" y="220" width="120" height="44" rx="22" fill="none" stroke="#6750A4" stroke-width="1"/>
  <text x="496" y="248" font-family="Roboto, sans-serif" font-size="14" font-weight="500" fill="#6750A4" text-anchor="middle">Learn More</text>
  <!-- Feature chips -->
  <rect x="200" y="300" width="100" height="32" rx="8" fill="#6750A4" fill-opacity="0.08"/>
  <text x="250" y="321" font-family="Roboto, sans-serif" font-size="12" fill="#6750A4" text-anchor="middle">Dynamic</text>
  <rect x="316" y="300" width="90" height="32" rx="8" fill="#625B71" fill-opacity="0.08"/>
  <text x="361" y="321" font-family="Roboto, sans-serif" font-size="12" fill="#625B71" text-anchor="middle">Adaptive</text>
  <rect x="422" y="300" width="100" height="32" rx="8" fill="#7D5260" fill-opacity="0.08"/>
  <text x="472" y="321" font-family="Roboto, sans-serif" font-size="12" fill="#7D5260" text-anchor="middle">Accessible</text>
  <!-- Bottom card preview -->
  <rect x="120" y="360" width="560" height="70" rx="16" fill="#FFFBFE" stroke="#1C1B1F" stroke-opacity="0.08" stroke-width="1"/>
  <circle cx="170" cy="395" r="20" fill="#6750A4" fill-opacity="0.1"/>
  <text x="200" y="390" font-family="Roboto, sans-serif" font-size="14" font-weight="500" fill="#1C1B1F">Material You components</text>
  <text x="200" y="410" font-family="Roboto, sans-serif" font-size="12" fill="#1C1B1F" fill-opacity="0.6">Beautiful, accessible UI built for everyone</text>
  <rect x="570" y="382" width="80" height="28" rx="14" fill="#6750A4" fill-opacity="0.08"/>
  <text x="610" y="401" font-family="Roboto, sans-serif" font-size="11" fill="#6750A4" text-anchor="middle">View</text>
</svg>