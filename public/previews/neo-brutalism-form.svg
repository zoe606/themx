<svg width="800" height="450" viewBox="0 0 800 450" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#FFFFFF"/>
  <!-- Decorative blocks -->
  <rect x="20" y="20" width="120" height="120" fill="#4ECDC4" stroke="#2D2D2D" stroke-width="3"/>
  <rect x="660" y="310" width="120" height="120" fill="#FFE66D" stroke="#2D2D2D" stroke-width="3"/>
  <!-- Form container with offset shadow -->
  <rect x="204" y="44" width="400" height="370" fill="#2D2D2D"/>
  <rect x="200" y="40" width="400" height="370" fill="#FFFFFF" stroke="#2D2D2D" stroke-width="3"/>
  <!-- Form title -->
  <text x="400" y="90" font-family="Space Grotesk, sans-serif" font-size="30" font-weight="700" fill="#2D2D2D" text-anchor="middle">Log In</text>
  <rect x="350" y="100" width="100" height="4" fill="#FF6B6B"/>
  <!-- Email label + input -->
  <text x="250" y="145" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#2D2D2D">Email</text>
  <rect x="254" y="158" width="300" height="44" fill="#2D2D2D"/>
  <rect x="250" y="154" width="300" height="44" fill="#FFFFFF" stroke="#2D2D2D" stroke-width="3"/>
  <text x="268" y="181" font-family="Inter, sans-serif" font-size="14" fill="#999999">you@example.com</text>
  <!-- Password label + input -->
  <text x="250" y="228" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#2D2D2D">Password</text>
  <rect x="254" y="240" width="300" height="44" fill="#2D2D2D"/>
  <rect x="250" y="236" width="300" height="44" fill="#FFFFFF" stroke="#2D2D2D" stroke-width="3"/>
  <text x="268" y="263" font-family="Inter, sans-serif" font-size="14" fill="#999999">Enter password</text>
  <!-- Submit button -->
  <rect x="254" y="314" width="300" height="50" fill="#2D2D2D"/>
  <rect x="250" y="310" width="300" height="50" fill="#FF6B6B" stroke="#2D2D2D" stroke-width="3"/>
  <text x="400" y="342" font-family="Space Grotesk, sans-serif" font-size="18" font-weight="700" fill="#FFFFFF" text-anchor="middle">Sign In</text>
  <!-- Footer text -->
  <text x="400" y="385" font-family="Inter, sans-serif" font-size="13" fill="#2D2D2D" text-anchor="middle">Don't have an account? <tspan font-weight="700" fill="#FF6B6B">Sign Up</tspan></text>
</svg>