<svg width="800" height="450" viewBox="0 0 800 450" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="nd-outer" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="5" dy="5" stdDeviation="8" flood-color="#B8BEC7" flood-opacity="0.8"/>
      <feDropShadow dx="-5" dy="-5" stdDeviation="8" flood-color="#FFFFFF" flood-opacity="0.9"/>
    </filter>
    <filter id="nd-pressed" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="3" dy="3" stdDeviation="4" flood-color="#B8BEC7" flood-opacity="0.6"/>
      <feDropShadow dx="-3" dy="-3" stdDeviation="4" flood-color="#FFFFFF" flood-opacity="0.7"/>
    </filter>
  </defs>
  <rect width="800" height="450" fill="#E0E5EC"/>
  <!-- Sidebar -->
  <rect x="20" y="20" width="180" height="410" rx="20" fill="#E0E5EC" filter="url(#nd-outer)"/>
  <text x="110" y="55" text-anchor="middle" font-family="Poppins, sans-serif" font-size="16" font-weight="600" fill="#44476A">Dashboard</text>
  <rect x="40" y="75" width="140" height="36" rx="12" fill="#E0E5EC" filter="url(#nd-pressed)"/>
  <text x="110" y="98" text-anchor="middle" font-family="Rubik, sans-serif" font-size="12" fill="#6C63FF">Overview</text>
  <rect x="40" y="125" width="140" height="36" rx="12" fill="#E0E5EC" filter="url(#nd-outer)"/>
  <text x="110" y="148" text-anchor="middle" font-family="Rubik, sans-serif" font-size="12" fill="#44476A">Analytics</text>
  <rect x="40" y="175" width="140" height="36" rx="12" fill="#E0E5EC" filter="url(#nd-outer)"/>
  <text x="110" y="198" text-anchor="middle" font-family="Rubik, sans-serif" font-size="12" fill="#44476A">Reports</text>
  <rect x="40" y="225" width="140" height="36" rx="12" fill="#E0E5EC" filter="url(#nd-outer)"/>
  <text x="110" y="248" text-anchor="middle" font-family="Rubik, sans-serif" font-size="12" fill="#44476A">Settings</text>
  <!-- Top stat cards -->
  <rect x="220" y="20" width="175" height="100" rx="16" fill="#E0E5EC" filter="url(#nd-outer)"/>
  <text x="307" y="55" text-anchor="middle" font-family="Poppins, sans-serif" font-size="26" font-weight="700" fill="#6C63FF">2.4k</text>
  <text x="307" y="80" text-anchor="middle" font-family="Rubik, sans-serif" font-size="11" fill="#44476A" opacity="0.6">Active Users</text>
  <rect x="410" y="20" width="175" height="100" rx="16" fill="#E0E5EC" filter="url(#nd-outer)"/>
  <text x="497" y="55" text-anchor="middle" font-family="Poppins, sans-serif" font-size="26" font-weight="700" fill="#A8A4FF">$8.7k</text>
  <text x="497" y="80" text-anchor="middle" font-family="Rubik, sans-serif" font-size="11" fill="#44476A" opacity="0.6">Revenue</text>
  <rect x="600" y="20" width="175" height="100" rx="16" fill="#E0E5EC" filter="url(#nd-outer)"/>
  <text x="687" y="55" text-anchor="middle" font-family="Poppins, sans-serif" font-size="26" font-weight="700" fill="#FF6584">94%</text>
  <text x="687" y="80" text-anchor="middle" font-family="Rubik, sans-serif" font-size="11" fill="#44476A" opacity="0.6">Uptime</text>
  <!-- Main content panel -->
  <rect x="220" y="140" width="555" height="290" rx="20" fill="#E0E5EC" filter="url(#nd-outer)"/>
  <text x="250" y="175" font-family="Poppins, sans-serif" font-size="16" font-weight="600" fill="#44476A">Performance</text>
  <!-- Chart bars -->
  <rect x="260" y="210" width="40" height="120" rx="8" fill="#E0E5EC" filter="url(#nd-pressed)"/>
  <rect x="260" y="260" width="40" height="70" rx="8" fill="#6C63FF" opacity="0.5"/>
  <rect x="330" y="210" width="40" height="120" rx="8" fill="#E0E5EC" filter="url(#nd-pressed)"/>
  <rect x="330" y="240" width="40" height="90" rx="8" fill="#6C63FF" opacity="0.5"/>
  <rect x="400" y="210" width="40" height="120" rx="8" fill="#E0E5EC" filter="url(#nd-pressed)"/>
  <rect x="400" y="220" width="40" height="110" rx="8" fill="#A8A4FF" opacity="0.5"/>
  <rect x="470" y="210" width="40" height="120" rx="8" fill="#E0E5EC" filter="url(#nd-pressed)"/>
  <rect x="470" y="250" width="40" height="80" rx="8" fill="#A8A4FF" opacity="0.5"/>
  <rect x="540" y="210" width="40" height="120" rx="8" fill="#E0E5EC" filter="url(#nd-pressed)"/>
  <rect x="540" y="230" width="40" height="100" rx="8" fill="#6C63FF" opacity="0.5"/>
  <rect x="610" y="210" width="40" height="120" rx="8" fill="#E0E5EC" filter="url(#nd-pressed)"/>
  <rect x="610" y="255" width="40" height="75" rx="8" fill="#FF6584" opacity="0.5"/>
  <rect x="680" y="210" width="40" height="120" rx="8" fill="#E0E5EC" filter="url(#nd-pressed)"/>
  <rect x="680" y="235" width="40" height="95" rx="8" fill="#6C63FF" opacity="0.5"/>
  <!-- Bottom info row -->
  <rect x="260" y="370" width="160" height="36" rx="10" fill="#E0E5EC" filter="url(#nd-pressed)"/>
  <text x="340" y="393" text-anchor="middle" font-family="Rubik, sans-serif" font-size="11" fill="#44476A">Last 7 days</text>
  <rect x="580" y="370" width="140" height="36" rx="10" fill="#E0E5EC" filter="url(#nd-outer)"/>
  <text x="650" y="393" text-anchor="middle" font-family="Poppins, sans-serif" font-size="11" font-weight="600" fill="#6C63FF">Export</text>
</svg>
