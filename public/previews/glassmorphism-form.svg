<svg width="800" height="450" viewBox="0 0 800 450" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gf-bg" x1="0" y1="0" x2="800" y2="450">
      <stop offset="0%" stop-color="#1E1B4B"/>
      <stop offset="50%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E1B4B"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#gf-bg)"/>
  <!-- Background orbs -->
  <circle cx="250" cy="200" r="180" fill="#7C3AED" opacity="0.2"/>
  <circle cx="550" cy="300" r="150" fill="#EC4899" opacity="0.2"/>
  <!-- Glass form panel -->
  <rect x="225" y="30" width="350" height="390" rx="20" fill="white" fill-opacity="0.1" stroke="white" stroke-opacity="0.2" stroke-width="1"/>
  <!-- Title -->
  <text x="400" y="80" font-family="Poppins, sans-serif" font-size="28" font-weight="600" fill="#F8FAFC" text-anchor="middle">Welcome Back</text>
  <text x="400" y="105" font-family="Inter, sans-serif" font-size="14" fill="#F8FAFC" fill-opacity="0.6" text-anchor="middle">Sign in to your account</text>
  <!-- Email input -->
  <text x="265" y="148" font-family="Inter, sans-serif" font-size="13" fill="#F8FAFC" fill-opacity="0.7">Email</text>
  <rect x="260" y="158" width="280" height="44" rx="10" fill="white" fill-opacity="0.08" stroke="white" stroke-opacity="0.15" stroke-width="1"/>
  <text x="278" y="185" font-family="Inter, sans-serif" font-size="14" fill="#F8FAFC" fill-opacity="0.35">you@example.com</text>
  <!-- Password input -->
  <text x="265" y="228" font-family="Inter, sans-serif" font-size="13" fill="#F8FAFC" fill-opacity="0.7">Password</text>
  <rect x="260" y="238" width="280" height="44" rx="10" fill="white" fill-opacity="0.08" stroke="white" stroke-opacity="0.15" stroke-width="1"/>
  <text x="278" y="265" font-family="Inter, sans-serif" font-size="14" fill="#F8FAFC" fill-opacity="0.35">Enter password</text>
  <!-- Submit button -->
  <rect x="260" y="310" width="280" height="48" rx="24" fill="#7C3AED" fill-opacity="0.6" stroke="white" stroke-opacity="0.2" stroke-width="1"/>
  <text x="400" y="340" font-family="Poppins, sans-serif" font-size="16" font-weight="500" fill="#F8FAFC" text-anchor="middle">Sign In</text>
  <!-- Footer -->
  <text x="400" y="390" font-family="Inter, sans-serif" font-size="13" fill="#F8FAFC" fill-opacity="0.5" text-anchor="middle">No account? <tspan fill="#06B6D4">Create one</tspan></text>
  <!-- Floating decorative glass elements -->
  <rect x="50" y="60" width="120" height="80" rx="12" fill="white" fill-opacity="0.05" stroke="white" stroke-opacity="0.1" stroke-width="1"/>
  <rect x="630" y="320" width="130" height="70" rx="12" fill="white" fill-opacity="0.05" stroke="white" stroke-opacity="0.1" stroke-width="1"/>
</svg>