<svg width="800" height="450" viewBox="0 0 800 450" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#FFFFFF"/>
  <!-- Grid lines -->
  <line x1="200" y1="0" x2="200" y2="450" stroke="#E5E5E5" stroke-width="0.5"/>
  <line x1="600" y1="0" x2="600" y2="450" stroke="#E5E5E5" stroke-width="0.5"/>
  <!-- Left label area -->
  <text x="60" y="100" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="500" fill="#FF0000" letter-spacing="2">SIGN IN</text>
  <text x="60" y="150" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="36" font-weight="700" fill="#000000">Log in to</text>
  <text x="60" y="190" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="36" font-weight="700" fill="#000000">your account</text>
  <!-- Form area - right side -->
  <!-- Email -->
  <text x="260" y="100" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="500" fill="#1A1A1A" letter-spacing="1">EMAIL</text>
  <line x1="260" y1="112" x2="560" y2="112" stroke="#1A1A1A" stroke-width="1"/>
  <rect x="260" y="118" width="300" height="40" fill="#FFFFFF"/>
  <line x1="260" y1="158" x2="560" y2="158" stroke="#E5E5E5" stroke-width="1"/>
  <text x="264" y="144" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="15" fill="#CCCCCC">you@example.com</text>
  <!-- Password -->
  <text x="260" y="195" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="500" fill="#1A1A1A" letter-spacing="1">PASSWORD</text>
  <rect x="260" y="205" width="300" height="40" fill="#FFFFFF"/>
  <line x1="260" y1="245" x2="560" y2="245" stroke="#E5E5E5" stroke-width="1"/>
  <text x="264" y="231" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="15" fill="#CCCCCC">Enter password</text>
  <!-- Submit -->
  <rect x="260" y="275" width="300" height="48" fill="#000000"/>
  <text x="410" y="305" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="14" font-weight="500" fill="#FFFFFF" text-anchor="middle">Sign In</text>
  <!-- Link -->
  <text x="260" y="350" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="13" fill="#1A1A1A">No account?</text>
  <text x="342" y="350" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="13" fill="#0057B7">Register</text>
  <line x1="342" y1="354" x2="394" y2="354" stroke="#0057B7" stroke-width="1"/>
  <!-- Bottom accent -->
  <line x1="60" y1="420" x2="740" y2="420" stroke="#1A1A1A" stroke-width="1"/>
  <rect x="60" y="420" width="40" height="3" fill="#FF0000"/>
</svg>