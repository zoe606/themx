<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <rect width="800" height="600" fill="#FAFAFA"/>
  <!-- Title -->
  <text x="40" y="50" font-family="Inter, sans-serif" font-size="24" font-weight="600" fill="#18181B">Bento Grid</text>
  <!-- Bento cells - asymmetric grid -->
  <!-- Large cell top-left (2x2) -->
  <rect x="40" y="80" width="350" height="240" rx="16" fill="#FFFFFF"/>
  <text x="70" y="140" font-family="Inter, sans-serif" font-size="48" font-weight="700" fill="#3B82F6">42%</text>
  <text x="70" y="170" font-family="Inter, sans-serif" font-size="14" fill="#18181B" opacity="0.6">Growth this quarter</text>
  <rect x="70" y="260" width="200" height="8" rx="4" fill="#3B82F6" opacity="0.2"/>
  <rect x="70" y="260" width="130" height="8" rx="4" fill="#3B82F6"/>
  <!-- Small cell top-right -->
  <rect x="410" y="80" width="170" height="110" rx="16" fill="#FFFFFF"/>
  <circle cx="495" cy="125" r="24" fill="#F59E0B" opacity="0.2"/>
  <text x="495" y="132" text-anchor="middle" font-family="Inter, sans-serif" font-size="20" fill="#F59E0B">&#9733;</text>
  <text x="495" y="156" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#18181B" opacity="0.6">Featured</text>
  <!-- Small cell far-right -->
  <rect x="600" y="80" width="160" height="110" rx="16" fill="#18181B"/>
  <text x="680" y="125" text-anchor="middle" font-family="Inter, sans-serif" font-size="28" font-weight="700" fill="#FAFAFA">128</text>
  <text x="680" y="150" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#FAFAFA" opacity="0.6">Active users</text>
  <!-- Mid-right tall cell -->
  <rect x="410" y="210" width="350" height="110" rx="16" fill="#FFFFFF"/>
  <rect x="440" y="240" width="280" height="8" rx="4" fill="#18181B" opacity="0.1"/>
  <rect x="440" y="258" width="240" height="8" rx="4" fill="#18181B" opacity="0.1"/>
  <rect x="440" y="276" width="260" height="8" rx="4" fill="#18181B" opacity="0.1"/>
  <!-- Bottom row -->
  <rect x="40" y="340" width="230" height="220" rx="16" fill="#3B82F6"/>
  <text x="155" y="430" text-anchor="middle" font-family="Inter, sans-serif" font-size="16" font-weight="600" fill="#FFFFFF">Analytics</text>
  <text x="155" y="455" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" fill="#FFFFFF" opacity="0.7">View dashboard</text>
  <rect x="290" y="340" width="230" height="220" rx="16" fill="#FFFFFF"/>
  <rect x="320" y="370" width="60" height="60" rx="12" fill="#F59E0B" opacity="0.15"/>
  <rect x="340" y="390" width="20" height="20" rx="4" fill="#F59E0B"/>
  <rect x="320" y="450" width="170" height="8" rx="4" fill="#18181B" opacity="0.1"/>
  <rect x="320" y="468" width="140" height="8" rx="4" fill="#18181B" opacity="0.1"/>
  <rect x="540" y="340" width="220" height="100" rx="16" fill="#FFFFFF"/>
  <rect x="570" y="370" width="160" height="8" rx="4" fill="#18181B" opacity="0.1"/>
  <rect x="570" y="388" width="120" height="8" rx="4" fill="#18181B" opacity="0.1"/>
  <rect x="540" y="460" width="220" height="100" rx="16" fill="#FFFFFF"/>
  <text x="650" y="510" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#18181B" opacity="0.5">Settings</text>
</svg>
