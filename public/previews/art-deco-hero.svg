<svg width="800" height="450" viewBox="0 0 800 450" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#0D1117"/>
  <!-- Geometric corner frames -->
  <polyline points="30,30 30,100 100,100" fill="none" stroke="#B8860B" stroke-width="1"/>
  <polyline points="30,30 100,30 100,100" fill="none" stroke="#B8860B" stroke-width="0.5" stroke-opacity="0.5"/>
  <polyline points="770,30 770,100 700,100" fill="none" stroke="#B8860B" stroke-width="1"/>
  <polyline points="770,30 700,30 700,100" fill="none" stroke="#B8860B" stroke-width="0.5" stroke-opacity="0.5"/>
  <polyline points="30,420 30,350 100,350" fill="none" stroke="#B8860B" stroke-width="1"/>
  <polyline points="770,420 770,350 700,350" fill="none" stroke="#B8860B" stroke-width="1"/>
  <!-- Sunburst accent -->
  <line x1="400" y1="60" x2="400" y2="30" stroke="#C9B037" stroke-width="0.5" stroke-opacity="0.3"/>
  <line x1="400" y1="60" x2="380" y2="32" stroke="#C9B037" stroke-width="0.5" stroke-opacity="0.3"/>
  <line x1="400" y1="60" x2="420" y2="32" stroke="#C9B037" stroke-width="0.5" stroke-opacity="0.3"/>
  <line x1="400" y1="60" x2="360" y2="38" stroke="#C9B037" stroke-width="0.5" stroke-opacity="0.2"/>
  <line x1="400" y1="60" x2="440" y2="38" stroke="#C9B037" stroke-width="0.5" stroke-opacity="0.2"/>
  <!-- Heading -->
  <text x="400" y="140" font-family="Poiret One, serif" font-size="56" fill="#E8DCC8" text-anchor="middle" letter-spacing="6">GEOMETRIC</text>
  <text x="400" y="200" font-family="Poiret One, serif" font-size="56" fill="#B8860B" text-anchor="middle" letter-spacing="6">GLAMOUR</text>
  <!-- Ornamental line -->
  <line x1="200" y1="225" x2="350" y2="225" stroke="#B8860B" stroke-width="0.5"/>
  <circle cx="400" cy="225" r="4" fill="none" stroke="#B8860B" stroke-width="1"/>
  <circle cx="400" cy="225" r="8" fill="none" stroke="#B8860B" stroke-width="0.5" stroke-opacity="0.4"/>
  <line x1="450" y1="225" x2="600" y2="225" stroke="#B8860B" stroke-width="0.5"/>
  <!-- Subtitle -->
  <text x="400" y="265" font-family="Raleway, sans-serif" font-size="15" fill="#E8DCC8" fill-opacity="0.7" text-anchor="middle" letter-spacing="3">THE ROARING TWENTIES REIMAGINED</text>
  <!-- CTA buttons -->
  <rect x="300" y="295" width="120" height="42" fill="none" stroke="#B8860B" stroke-width="1"/>
  <text x="360" y="321" font-family="Raleway, sans-serif" font-size="11" fill="#B8860B" text-anchor="middle" letter-spacing="3">EXPLORE</text>
  <rect x="440" y="295" width="100" height="42" fill="none" stroke="#C9B037" stroke-width="0.5" stroke-opacity="0.4"/>
  <text x="490" y="321" font-family="Raleway, sans-serif" font-size="11" fill="#C9B037" fill-opacity="0.6" text-anchor="middle" letter-spacing="3">LEARN</text>
  <!-- Fan motif at bottom -->
  <path d="M400 420 L350 380 L360 380 L400 410 L440 380 L450 380 Z" fill="#B8860B" fill-opacity="0.1" stroke="#B8860B" stroke-width="0.5"/>
  <path d="M400 420 L370 390 L380 390 L400 412 L420 390 L430 390 Z" fill="#B8860B" fill-opacity="0.15"/>
  <!-- Vertical lines accent -->
  <line x1="130" y1="120" x2="130" y2="340" stroke="#B8860B" stroke-width="0.5" stroke-opacity="0.15"/>
  <line x1="140" y1="130" x2="140" y2="330" stroke="#B8860B" stroke-width="0.5" stroke-opacity="0.1"/>
  <line x1="670" y1="120" x2="670" y2="340" stroke="#B8860B" stroke-width="0.5" stroke-opacity="0.15"/>
  <line x1="660" y1="130" x2="660" y2="330" stroke="#B8860B" stroke-width="0.5" stroke-opacity="0.1"/>
</svg>