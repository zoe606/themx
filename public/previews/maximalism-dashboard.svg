  <rect x="290" y="310" width="32" height="100" fill="#7C3AED" stroke="#1C1917" stroke-width="1"/>
  <rect x="334" y="270" width="32" height="130" fill="#F97316" stroke="#1C1917" stroke-width="1"/>
