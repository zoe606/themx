  <rect x="608" y="324" width="156" height="30" fill="#E11D48" fill-opacity="0.1" stroke="#1C1917" stroke-width="1"/>
  <text x="618" y="344" font-family="DM Sans, sans-serif" font-size="11" fill="#1C1917">Bug reported</text>
  <rect x="608" y="362" width="156" height="30" fill="#7C3AED" fill-opacity="0.1" stroke="#1C1917" stroke-width="1"/>
  <text x="618" y="382" font-family="DM Sans, sans-serif" font-size="11" fill="#1C1917">Deploy done!</text>
