<svg width="800" height="450" viewBox="0 0 800 450" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="gmf-b1" cx="40%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gmf-b2" cx="70%" cy="30%" r="40%">
      <stop offset="0%" stop-color="#EC4899" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#EC4899" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="450" fill="#FAFAFA"/>
  <rect width="800" height="450" fill="url(#gmf-b1)"/>
  <rect width="800" height="450" fill="url(#gmf-b2)"/>
  <!-- Form glass card -->
  <rect x="220" y="25" width="360" height="400" rx="20" fill="#FFFFFF" fill-opacity="0.5" stroke="#FFFFFF" stroke-opacity="0.7"/>
  <text x="400" y="70" text-anchor="middle" font-family="sans-serif" font-size="24" font-weight="700" fill="#1E1B4B">Get in Touch</text>
  <text x="400" y="95" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1E1B4B" opacity="0.6">We would love to hear from you</text>
  <!-- Name field -->
  <text x="255" y="132" font-family="sans-serif" font-size="12" font-weight="500" fill="#1E1B4B" opacity="0.7">Full Name</text>
  <rect x="255" y="140" width="290" height="42" rx="12" fill="#FFFFFF" fill-opacity="0.6" stroke="#8B5CF6" stroke-opacity="0.3" stroke-width="1"/>
  <text x="275" y="166" font-family="sans-serif" font-size="13" fill="#1E1B4B" opacity="0.3">Jane Smith</text>
  <!-- Email field -->
  <text x="255" y="205" font-family="sans-serif" font-size="12" font-weight="500" fill="#1E1B4B" opacity="0.7">Email</text>
  <rect x="255" y="213" width="290" height="42" rx="12" fill="#FFFFFF" fill-opacity="0.6" stroke="#8B5CF6" stroke-opacity="0.3" stroke-width="1"/>
  <text x="275" y="239" font-family="sans-serif" font-size="13" fill="#1E1B4B" opacity="0.3">you@example.com</text>
  <!-- Message field -->
  <text x="255" y="278" font-family="sans-serif" font-size="12" font-weight="500" fill="#1E1B4B" opacity="0.7">Message</text>
  <rect x="255" y="286" width="290" height="70" rx="12" fill="#FFFFFF" fill-opacity="0.6" stroke="#8B5CF6" stroke-opacity="0.3" stroke-width="1"/>
  <text x="275" y="312" font-family="sans-serif" font-size="13" fill="#1E1B4B" opacity="0.3">Your message here...</text>
  <!-- Submit -->
  <rect x="255" y="375" width="290" height="42" rx="21" fill="#8B5CF6"/>
  <text x="400" y="401" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="600" fill="#FFFFFF">Send Message</text>
</svg>
