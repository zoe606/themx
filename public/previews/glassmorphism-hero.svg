<svg width="800" height="450" viewBox="0 0 800 450" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gh-bg" x1="0" y1="0" x2="800" y2="450">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="50%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>
    <linearGradient id="gh-orb1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#EC4899" stop-opacity="0.3"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#gh-bg)"/>
  <!-- Background orbs -->
  <circle cx="200" cy="150" r="150" fill="#7C3AED" opacity="0.3"/>
  <circle cx="650" cy="300" r="120" fill="#EC4899" opacity="0.3"/>
  <circle cx="400" cy="400" r="100" fill="#06B6D4" opacity="0.2"/>
  <!-- Glass panel -->
  <rect x="100" y="80" width="600" height="290" rx="20" fill="white" fill-opacity="0.1" stroke="white" stroke-opacity="0.2" stroke-width="1"/>
  <!-- Inner content -->
  <text x="400" y="150" font-family="Poppins, sans-serif" font-size="44" font-weight="600" fill="#F8FAFC" text-anchor="middle">Transparent Beauty</text>
  <text x="400" y="195" font-family="Inter, sans-serif" font-size="18" fill="#F8FAFC" fill-opacity="0.8" text-anchor="middle">Frosted glass interfaces that feel weightless and modern.</text>
  <text x="400" y="222" font-family="Inter, sans-serif" font-size="18" fill="#F8FAFC" fill-opacity="0.8" text-anchor="middle">Depth through transparency, elegance through blur.</text>
  <!-- CTA buttons -->
  <rect x="260" y="260" width="160" height="48" rx="24" fill="white" fill-opacity="0.15" stroke="white" stroke-opacity="0.3" stroke-width="1"/>
  <text x="340" y="290" font-family="Poppins, sans-serif" font-size="16" font-weight="500" fill="#F8FAFC" text-anchor="middle">Get Started</text>
  <rect x="440" y="260" width="120" height="48" rx="24" fill="white" fill-opacity="0.05" stroke="white" stroke-opacity="0.2" stroke-width="1"/>
  <text x="500" y="290" font-family="Poppins, sans-serif" font-size="16" font-weight="500" fill="#F8FAFC" fill-opacity="0.8" text-anchor="middle">Docs</text>
  <!-- Small floating glass elements -->
  <rect x="50" y="380" width="180" height="50" rx="12" fill="white" fill-opacity="0.08" stroke="white" stroke-opacity="0.15" stroke-width="1"/>
  <rect x="580" y="30" width="180" height="40" rx="10" fill="white" fill-opacity="0.08" stroke="white" stroke-opacity="0.15" stroke-width="1"/>
</svg>