<svg width="800" height="450" viewBox="0 0 800 450" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#0A0A0A"/>
  <!-- Form container -->
  <rect x="225" y="30" width="350" height="390" fill="none" stroke="#D4AF37" stroke-width="0.5" stroke-opacity="0.3"/>
  <!-- Corner accents -->
  <line x1="225" y1="30" x2="255" y2="30" stroke="#D4AF37" stroke-width="1"/>
  <line x1="225" y1="30" x2="225" y2="60" stroke="#D4AF37" stroke-width="1"/>
  <line x1="575" y1="30" x2="545" y2="30" stroke="#D4AF37" stroke-width="1"/>
  <line x1="575" y1="30" x2="575" y2="60" stroke="#D4AF37" stroke-width="1"/>
  <line x1="225" y1="420" x2="255" y2="420" stroke="#D4AF37" stroke-width="1"/>
  <line x1="225" y1="420" x2="225" y2="390" stroke="#D4AF37" stroke-width="1"/>
  <line x1="575" y1="420" x2="545" y2="420" stroke="#D4AF37" stroke-width="1"/>
  <line x1="575" y1="420" x2="575" y2="390" stroke="#D4AF37" stroke-width="1"/>
  <!-- Title -->
  <text x="400" y="85" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#E5E5E5" text-anchor="middle" letter-spacing="2">Welcome</text>
  <line x1="360" y1="100" x2="440" y2="100" stroke="#D4AF37" stroke-width="0.5"/>
  <text x="400" y="125" font-family="Lato, sans-serif" font-size="12" fill="#C0C0C0" text-anchor="middle" letter-spacing="2">SIGN IN TO YOUR ACCOUNT</text>
  <!-- Email -->
  <text x="275" y="168" font-family="Lato, sans-serif" font-size="10" fill="#D4AF37" letter-spacing="2">EMAIL</text>
  <rect x="270" y="178" width="260" height="42" fill="none" stroke="#D4AF37" stroke-width="0.5" stroke-opacity="0.3"/>
  <text x="288" y="205" font-family="Lato, sans-serif" font-size="13" fill="#C0C0C0" fill-opacity="0.3">you@example.com</text>
  <!-- Password -->
  <text x="275" y="248" font-family="Lato, sans-serif" font-size="10" fill="#D4AF37" letter-spacing="2">PASSWORD</text>
  <rect x="270" y="258" width="260" height="42" fill="none" stroke="#D4AF37" stroke-width="0.5" stroke-opacity="0.3"/>
  <text x="288" y="285" font-family="Lato, sans-serif" font-size="13" fill="#C0C0C0" fill-opacity="0.3">Enter password</text>
  <!-- Submit -->
  <rect x="270" y="325" width="260" height="44" fill="#D4AF37" fill-opacity="0.1" stroke="#D4AF37" stroke-width="0.5"/>
  <text x="400" y="352" font-family="Lato, sans-serif" font-size="12" fill="#D4AF37" text-anchor="middle" letter-spacing="2">SIGN IN</text>
  <!-- Footer -->
  <text x="400" y="400" font-family="Lato, sans-serif" font-size="11" fill="#C0C0C0" fill-opacity="0.5" text-anchor="middle">No account? <tspan fill="#D4AF37">Register</tspan></text>
  <!-- Side decorative lines -->
  <line x1="100" y1="100" x2="100" y2="350" stroke="#D4AF37" stroke-width="0.5" stroke-opacity="0.1"/>
  <line x1="700" y1="100" x2="700" y2="350" stroke="#D4AF37" stroke-width="0.5" stroke-opacity="0.1"/>
</svg>