<svg width="800" height="450" viewBox="0 0 800 450" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#0D1117"/>
  <!-- Title -->
  <text x="400" y="35" font-family="Raleway, sans-serif" font-size="11" fill="#B8860B" text-anchor="middle" letter-spacing="4">COLLECTIONS</text>
  <line x1="300" y1="45" x2="360" y2="45" stroke="#B8860B" stroke-width="0.5"/>
  <circle cx="400" cy="45" r="3" fill="#B8860B"/>
  <line x1="440" y1="45" x2="500" y2="45" stroke="#B8860B" stroke-width="0.5"/>
  <!-- Card 1 -->
  <rect x="50" y="70" width="220" height="320" fill="none" stroke="#B8860B" stroke-width="1"/>
  <!-- Chevron top ornament -->
  <polyline points="120,80 160,70 200,80" fill="none" stroke="#C9B037" stroke-width="0.5"/>
  <rect x="50" y="70" width="220" height="100" fill="#B8860B" fill-opacity="0.05"/>
  <text x="160" y="130" font-family="Poiret One, serif" font-size="36" fill="#B8860B" text-anchor="middle">I</text>
  <line x1="60" y1="170" x2="260" y2="170" stroke="#B8860B" stroke-width="0.5" stroke-opacity="0.3"/>
  <text x="160" y="210" font-family="Poiret One, serif" font-size="22" fill="#E8DCC8" text-anchor="middle" letter-spacing="2">Heritage</text>
  <text x="160" y="240" font-family="Raleway, sans-serif" font-size="12" fill="#E8DCC8" fill-opacity="0.6" text-anchor="middle">Timeless elegance from</text>
  <text x="160" y="258" font-family="Raleway, sans-serif" font-size="12" fill="#E8DCC8" fill-opacity="0.6" text-anchor="middle">the golden age.</text>
  <rect x="115" y="310" width="90" height="32" fill="none" stroke="#B8860B" stroke-width="0.5"/>
  <text x="160" y="332" font-family="Raleway, sans-serif" font-size="10" fill="#B8860B" text-anchor="middle" letter-spacing="2">VIEW</text>
  <!-- Card 2 -->
  <rect x="290" y="70" width="220" height="320" fill="none" stroke="#B8860B" stroke-width="1"/>
  <polyline points="360,80 400,70 440,80" fill="none" stroke="#C9B037" stroke-width="0.5"/>
  <rect x="290" y="70" width="220" height="100" fill="#1B3A4B" fill-opacity="0.2"/>
  <text x="400" y="130" font-family="Poiret One, serif" font-size="36" fill="#B8860B" text-anchor="middle">II</text>
  <line x1="300" y1="170" x2="500" y2="170" stroke="#B8860B" stroke-width="0.5" stroke-opacity="0.3"/>
  <text x="400" y="210" font-family="Poiret One, serif" font-size="22" fill="#E8DCC8" text-anchor="middle" letter-spacing="2">Prestige</text>
  <text x="400" y="240" font-family="Raleway, sans-serif" font-size="12" fill="#E8DCC8" fill-opacity="0.6" text-anchor="middle">Architectural grandeur</text>
  <text x="400" y="258" font-family="Raleway, sans-serif" font-size="12" fill="#E8DCC8" fill-opacity="0.6" text-anchor="middle">meets digital craft.</text>
  <rect x="355" y="310" width="90" height="32" fill="none" stroke="#B8860B" stroke-width="0.5"/>
  <text x="400" y="332" font-family="Raleway, sans-serif" font-size="10" fill="#B8860B" text-anchor="middle" letter-spacing="2">VIEW</text>
  <!-- Card 3 -->
  <rect x="530" y="70" width="220" height="320" fill="none" stroke="#B8860B" stroke-width="1"/>
  <polyline points="600,80 640,70 680,80" fill="none" stroke="#C9B037" stroke-width="0.5"/>
  <rect x="530" y="70" width="220" height="100" fill="#B8860B" fill-opacity="0.05"/>
  <text x="640" y="130" font-family="Poiret One, serif" font-size="36" fill="#B8860B" text-anchor="middle">III</text>
  <line x1="540" y1="170" x2="740" y2="170" stroke="#B8860B" stroke-width="0.5" stroke-opacity="0.3"/>
  <text x="640" y="210" font-family="Poiret One, serif" font-size="22" fill="#E8DCC8" text-anchor="middle" letter-spacing="2">Opulence</text>
  <text x="640" y="240" font-family="Raleway, sans-serif" font-size="12" fill="#E8DCC8" fill-opacity="0.6" text-anchor="middle">Bold geometry and</text>
  <text x="640" y="258" font-family="Raleway, sans-serif" font-size="12" fill="#E8DCC8" fill-opacity="0.6" text-anchor="middle">metallic luxury.</text>
  <rect x="595" y="310" width="90" height="32" fill="none" stroke="#B8860B" stroke-width="0.5"/>
  <text x="640" y="332" font-family="Raleway, sans-serif" font-size="10" fill="#B8860B" text-anchor="middle" letter-spacing="2">VIEW</text>
  <!-- Bottom ornamental line -->
  <line x1="50" y1="420" x2="750" y2="420" stroke="#B8860B" stroke-width="0.5" stroke-opacity="0.2"/>
</svg>