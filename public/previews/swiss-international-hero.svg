<svg width="800" height="450" viewBox="0 0 800 450" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#FFFFFF"/>
  <!-- Grid lines (subtle) -->
  <line x1="60" y1="0" x2="60" y2="450" stroke="#E5E5E5" stroke-width="0.5"/>
  <line x1="200" y1="0" x2="200" y2="450" stroke="#E5E5E5" stroke-width="0.5"/>
  <line x1="400" y1="0" x2="400" y2="450" stroke="#E5E5E5" stroke-width="0.5"/>
  <line x1="600" y1="0" x2="600" y2="450" stroke="#E5E5E5" stroke-width="0.5"/>
  <line x1="740" y1="0" x2="740" y2="450" stroke="#E5E5E5" stroke-width="0.5"/>
  <!-- Red accent bar -->
  <rect x="60" y="60" width="6" height="120" fill="#FF0000"/>
  <!-- Heading — dramatic scale -->
  <text x="90" y="120" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="72" font-weight="700" fill="#000000">The Grid</text>
  <text x="90" y="175" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="72" font-weight="700" fill="#000000">Is Everything.</text>
  <!-- Subtitle -->
  <text x="90" y="230" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="18" font-weight="400" fill="#1A1A1A">Precision, clarity, and purpose in every element.</text>
  <text x="90" y="256" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="18" font-weight="400" fill="#1A1A1A">Swiss design principles for the digital age.</text>
  <!-- CTA button -->
  <rect x="90" y="290" width="160" height="48" fill="#000000"/>
  <text x="170" y="320" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="15" font-weight="500" fill="#FFFFFF" text-anchor="middle">Explore</text>
  <!-- Blue accent -->
  <text x="280" y="320" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="15" font-weight="500" fill="#0057B7">Learn more</text>
  <line x1="280" y1="326" x2="360" y2="326" stroke="#0057B7" stroke-width="1"/>
  <!-- Large number accent -->
  <text x="600" y="400" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="180" font-weight="700" fill="#000000" fill-opacity="0.05">01</text>
  <!-- Bottom rule -->
  <line x1="60" y1="420" x2="740" y2="420" stroke="#1A1A1A" stroke-width="1"/>
  <text x="60" y="440" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" fill="#1A1A1A">Swiss / International Typographic Style</text>
  <text x="740" y="440" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" fill="#1A1A1A" text-anchor="end">2026</text>
</svg>