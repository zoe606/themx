<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <filter id="neu-outer" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="6" dy="6" stdDeviation="10" flood-color="#B8BEC7" flood-opacity="0.8"/>
      <feDropShadow dx="-6" dy="-6" stdDeviation="10" flood-color="#FFFFFF" flood-opacity="0.9"/>
    </filter>
    <filter id="neu-pressed" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="3" dy="3" stdDeviation="6" flood-color="#B8BEC7" flood-opacity="0.6" result="dark"/>
      <feDropShadow dx="-3" dy="-3" stdDeviation="6" flood-color="#FFFFFF" flood-opacity="0.7"/>
    </filter>
  </defs>
  <rect width="800" height="600" fill="#E0E5EC"/>
  <!-- Title bar -->
  <rect x="40" y="30" width="720" height="80" rx="20" fill="#E0E5EC" filter="url(#neu-outer)"/>
  <text x="400" y="80" text-anchor="middle" font-family="Poppins, sans-serif" font-size="30" font-weight="600" fill="#44476A">Neumorphism</text>
  <!-- Cards row -->
  <rect x="40" y="150" width="220" height="260" rx="24" fill="#E0E5EC" filter="url(#neu-outer)"/>
  <circle cx="150" cy="230" r="40" fill="#E0E5EC" filter="url(#neu-pressed)"/>
  <circle cx="150" cy="230" r="18" fill="#6C63FF"/>
  <text x="150" y="310" text-anchor="middle" font-family="Rubik, sans-serif" font-size="16" fill="#44476A">Analytics</text>
  <rect x="70" y="340" width="160" height="10" rx="5" fill="#E0E5EC" filter="url(#neu-pressed)"/>
  <rect x="70" y="340" width="100" height="10" rx="5" fill="#6C63FF" opacity="0.6"/>
  <rect x="290" y="150" width="220" height="260" rx="24" fill="#E0E5EC" filter="url(#neu-outer)"/>
  <circle cx="400" cy="230" r="40" fill="#E0E5EC" filter="url(#neu-pressed)"/>
  <circle cx="400" cy="230" r="18" fill="#A8A4FF"/>
  <text x="400" y="310" text-anchor="middle" font-family="Rubik, sans-serif" font-size="16" fill="#44476A">Settings</text>
  <rect x="320" y="340" width="160" height="10" rx="5" fill="#E0E5EC" filter="url(#neu-pressed)"/>
  <rect x="320" y="340" width="130" height="10" rx="5" fill="#A8A4FF" opacity="0.6"/>
  <rect x="540" y="150" width="220" height="260" rx="24" fill="#E0E5EC" filter="url(#neu-outer)"/>
  <circle cx="650" cy="230" r="40" fill="#E0E5EC" filter="url(#neu-pressed)"/>
  <circle cx="650" cy="230" r="18" fill="#FF6584"/>
  <text x="650" y="310" text-anchor="middle" font-family="Rubik, sans-serif" font-size="16" fill="#44476A">Alerts</text>
  <rect x="570" y="340" width="160" height="10" rx="5" fill="#E0E5EC" filter="url(#neu-pressed)"/>
  <rect x="570" y="340" width="80" height="10" rx="5" fill="#FF6584" opacity="0.6"/>
  <!-- Bottom button -->
  <rect x="280" y="470" width="240" height="56" rx="16" fill="#E0E5EC" filter="url(#neu-outer)"/>
  <text x="400" y="505" text-anchor="middle" font-family="Poppins, sans-serif" font-size="18" font-weight="600" fill="#6C63FF">Get Started</text>
</svg>
