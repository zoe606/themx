<svg width="800" height="450" viewBox="0 0 800 450" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#FFFBFE"/>
  <!-- Navigation rail (M3 style) -->
  <rect x="0" y="0" width="80" height="450" fill="#FFFBFE"/>
  <line x1="80" y1="0" x2="80" y2="450" stroke="#1C1B1F" stroke-opacity="0.06" stroke-width="1"/>
  <!-- Nav items -->
  <rect x="14" y="20" width="52" height="32" rx="16" fill="#6750A4" fill-opacity="0.12"/>
  <circle cx="40" cy="36" r="8" fill="#6750A4" fill-opacity="0.3"/>
  <text x="40" y="68" font-family="Roboto, sans-serif" font-size="10" fill="#1C1B1F" text-anchor="middle">Home</text>
  <circle cx="40" cy="104" r="8" fill="#1C1B1F" fill-opacity="0.15"/>
  <text x="40" y="128" font-family="Roboto, sans-serif" font-size="10" fill="#1C1B1F" fill-opacity="0.5" text-anchor="middle">Stats</text>
  <circle cx="40" cy="160" r="8" fill="#1C1B1F" fill-opacity="0.15"/>
  <text x="40" y="184" font-family="Roboto, sans-serif" font-size="10" fill="#1C1B1F" fill-opacity="0.5" text-anchor="middle">Users</text>
  <!-- Main content -->
  <text x="110" y="36" font-family="Roboto, sans-serif" font-size="20" font-weight="400" fill="#1C1B1F">Dashboard</text>
  <!-- Stat cards - tonal surfaces -->
  <rect x="110" y="56" width="200" height="90" rx="16" fill="#6750A4" fill-opacity="0.08"/>
  <text x="130" y="82" font-family="Roboto, sans-serif" font-size="11" fill="#6750A4">Total Users</text>
  <text x="130" y="118" font-family="Roboto, sans-serif" font-size="28" font-weight="500" fill="#1C1B1F">12,847</text>
  <rect x="326" y="56" width="200" height="90" rx="16" fill="#625B71" fill-opacity="0.08"/>
  <text x="346" y="82" font-family="Roboto, sans-serif" font-size="11" fill="#625B71">Revenue</text>
  <text x="346" y="118" font-family="Roboto, sans-serif" font-size="28" font-weight="500" fill="#1C1B1F">$48.2K</text>
  <rect x="542" y="56" width="200" height="90" rx="16" fill="#7D5260" fill-opacity="0.08"/>
  <text x="562" y="82" font-family="Roboto, sans-serif" font-size="11" fill="#7D5260">Growth</text>
  <text x="562" y="118" font-family="Roboto, sans-serif" font-size="28" font-weight="500" fill="#1C1B1F">+24%</text>
  <!-- Chart card -->
  <rect x="110" y="166" width="416" height="264" rx="16" fill="#FFFBFE" stroke="#1C1B1F" stroke-opacity="0.06" stroke-width="1"/>
  <text x="130" y="196" font-family="Roboto, sans-serif" font-size="14" font-weight="500" fill="#1C1B1F">Activity Overview</text>
  <!-- Rounded bar chart -->
  <rect x="150" y="340" width="32" height="60" rx="4" fill="#6750A4" fill-opacity="0.2"/>
  <rect x="200" y="300" width="32" height="100" rx="4" fill="#6750A4" fill-opacity="0.35"/>
  <rect x="250" y="270" width="32" height="130" rx="4" fill="#6750A4"/>
  <rect x="300" y="310" width="32" height="90" rx="4" fill="#6750A4" fill-opacity="0.35"/>
  <rect x="350" y="260" width="32" height="140" rx="4" fill="#6750A4"/>
  <rect x="400" y="290" width="32" height="110" rx="4" fill="#6750A4" fill-opacity="0.35"/>
  <rect x="450" y="240" width="32" height="160" rx="4" fill="#7D5260"/>
  <!-- Right panel -->
  <rect x="542" y="166" width="200" height="264" rx="16" fill="#FFFBFE" stroke="#1C1B1F" stroke-opacity="0.06" stroke-width="1"/>
  <text x="562" y="196" font-family="Roboto, sans-serif" font-size="14" font-weight="500" fill="#1C1B1F">Recent</text>
  <rect x="554" y="212" width="176" height="36" rx="8" fill="#6750A4" fill-opacity="0.04"/>
  <text x="566" y="235" font-family="Roboto, sans-serif" font-size="11" fill="#1C1B1F" fill-opacity="0.7">New signup</text>
  <rect x="554" y="256" width="176" height="36" rx="8" fill="#6750A4" fill-opacity="0.04"/>
  <text x="566" y="279" font-family="Roboto, sans-serif" font-size="11" fill="#1C1B1F" fill-opacity="0.7">Payment received</text>
  <rect x="554" y="300" width="176" height="36" rx="8" fill="#6750A4" fill-opacity="0.04"/>
  <text x="566" y="323" font-family="Roboto, sans-serif" font-size="11" fill="#1C1B1F" fill-opacity="0.7">Order shipped</text>
  <rect x="554" y="344" width="176" height="36" rx="8" fill="#6750A4" fill-opacity="0.04"/>
  <text x="566" y="367" font-family="Roboto, sans-serif" font-size="11" fill="#1C1B1F" fill-opacity="0.7">Bug reported</text>
  <rect x="554" y="388" width="176" height="36" rx="8" fill="#6750A4" fill-opacity="0.04"/>
  <text x="566" y="411" font-family="Roboto, sans-serif" font-size="11" fill="#1C1B1F" fill-opacity="0.7">Deploy complete</text>
