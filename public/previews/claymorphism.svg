<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <filter id="clay-shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#94A3B8" flood-opacity="0.3"/>
    </filter>
    <filter id="clay-inner" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#94A3B8" flood-opacity="0.25"/>
    </filter>
  </defs>
  <rect width="800" height="600" fill="#F1F5F9"/>
  <!-- Title -->
  <text x="400" y="60" text-anchor="middle" font-family="sans-serif" font-size="28" font-weight="700" fill="#334155">Claymorphism</text>
  <!-- Clay card 1 -->
  <rect x="60" y="100" width="300" height="200" rx="32" fill="#EEF2FF" filter="url(#clay-shadow)"/>
  <rect x="80" y="120" width="100" height="100" rx="28" fill="#6366F1" opacity="0.2" filter="url(#clay-inner)"/>
  <circle cx="130" cy="170" r="24" fill="#6366F1" opacity="0.5"/>
  <rect x="80" y="240" width="200" height="10" rx="5" fill="#334155" opacity="0.15"/>
  <rect x="80" y="260" width="160" height="10" rx="5" fill="#334155" opacity="0.1"/>
  <!-- Clay card 2 -->
  <rect x="400" y="100" width="340" height="200" rx="32" fill="#FDF2F8" filter="url(#clay-shadow)"/>
  <rect x="420" y="120" width="100" height="100" rx="28" fill="#EC4899" opacity="0.2" filter="url(#clay-inner)"/>
  <circle cx="470" cy="170" r="24" fill="#EC4899" opacity="0.5"/>
  <rect x="420" y="240" width="240" height="10" rx="5" fill="#334155" opacity="0.15"/>
  <rect x="420" y="260" width="180" height="10" rx="5" fill="#334155" opacity="0.1"/>
  <!-- Clay card 3 (large bottom) -->
  <rect x="60" y="340" width="680" height="200" rx="32" fill="#FFFBEB" filter="url(#clay-shadow)"/>
  <!-- Clay buttons inside -->
  <rect x="100" y="380" width="140" height="52" rx="26" fill="#6366F1" filter="url(#clay-inner)"/>
  <text x="170" y="412" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="600" fill="#FFFFFF">Primary</text>
  <rect x="270" y="380" width="140" height="52" rx="26" fill="#EC4899" filter="url(#clay-inner)"/>
  <text x="340" y="412" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="600" fill="#FFFFFF">Secondary</text>
  <rect x="440" y="380" width="140" height="52" rx="26" fill="#F59E0B" filter="url(#clay-inner)"/>
  <text x="510" y="412" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="600" fill="#FFFFFF">Accent</text>
  <!-- Bottom text lines -->
  <rect x="100" y="460" width="500" height="10" rx="5" fill="#334155" opacity="0.1"/>
  <rect x="100" y="480" width="400" height="10" rx="5" fill="#334155" opacity="0.08"/>
  <rect x="100" y="500" width="450" height="10" rx="5" fill="#334155" opacity="0.08"/>
</svg>
