<svg width="800" height="450" viewBox="0 0 800 450" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="cf-shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#94A3B8" flood-opacity="0.15"/>
    </filter>
  </defs>
  <rect width="800" height="450" fill="#F1F5F9"/>
  <!-- Decorative clay blobs -->
  <circle cx="120" cy="120" r="60" fill="#6366F1" fill-opacity="0.06" filter="url(#cf-shadow)"/>
  <circle cx="680" cy="340" r="50" fill="#EC4899" fill-opacity="0.06" filter="url(#cf-shadow)"/>
  <rect x="650" y="60" width="80" height="60" rx="20" fill="#F59E0B" fill-opacity="0.06" filter="url(#cf-shadow)"/>
  <!-- Form card -->
  <rect x="225" y="30" width="350" height="390" rx="28" fill="#FFFFFF" filter="url(#cf-shadow)"/>
  <rect x="229" y="34" width="342" height="5" rx="2.5" fill="white" fill-opacity="0.9"/>
  <!-- Title -->
  <text x="400" y="82" font-family="Nunito, sans-serif" font-size="26" font-weight="700" fill="#334155" text-anchor="middle">Welcome Back</text>
  <text x="400" y="108" font-family="Nunito, sans-serif" font-size="14" fill="#334155" fill-opacity="0.5" text-anchor="middle">Sign in to your account</text>
  <!-- Email -->
  <text x="275" y="148" font-family="Nunito, sans-serif" font-size="13" font-weight="600" fill="#334155">Email</text>
  <rect x="270" y="158" width="260" height="46" rx="16" fill="#F1F5F9"/>
  <rect x="272" y="160" width="256" height="3" rx="1.5" fill="white" fill-opacity="0.7"/>
  <text x="290" y="187" font-family="Nunito, sans-serif" font-size="14" fill="#334155" fill-opacity="0.3">you@example.com</text>
  <!-- Password -->
  <text x="275" y="230" font-family="Nunito, sans-serif" font-size="13" font-weight="600" fill="#334155">Password</text>
  <rect x="270" y="240" width="260" height="46" rx="16" fill="#F1F5F9"/>
  <rect x="272" y="242" width="256" height="3" rx="1.5" fill="white" fill-opacity="0.7"/>
  <text x="290" y="269" font-family="Nunito, sans-serif" font-size="14" fill="#334155" fill-opacity="0.3">Enter password</text>
  <!-- Submit -->
  <rect x="270" y="310" width="260" height="48" rx="24" fill="#6366F1" filter="url(#cf-shadow)"/>
  <rect x="272" y="312" width="256" height="4" rx="2" fill="white" fill-opacity="0.3"/>
  <text x="400" y="340" font-family="Nunito, sans-serif" font-size="16" font-weight="600" fill="#FFFFFF" text-anchor="middle">Sign In</text>
  <!-- Footer -->
  <text x="400" y="392" font-family="Nunito, sans-serif" font-size="13" fill="#334155" fill-opacity="0.5" text-anchor="middle">No account? <tspan fill="#6366F1" font-weight="600">Sign Up</tspan></text>
</svg>