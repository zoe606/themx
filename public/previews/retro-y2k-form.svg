<svg width="800" height="450" viewBox="0 0 800 450" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#1A0033"/>
  <defs>
    <pattern id="rf-scan" patternUnits="userSpaceOnUse" width="800" height="4">
      <rect width="800" height="2" fill="white" fill-opacity="0.02"/>
    </pattern>
  </defs>
  <rect width="800" height="450" fill="url(#rf-scan)"/>
  <!-- Decorative elements -->
  <circle cx="120" cy="100" r="40" fill="none" stroke="#FF00FF" stroke-width="1" stroke-opacity="0.15"/>
  <circle cx="680" cy="350" r="50" fill="none" stroke="#00FFFF" stroke-width="1" stroke-opacity="0.15"/>
  <!-- Form container -->
  <rect x="225" y="25" width="350" height="400" fill="none" stroke="#FF00FF" stroke-width="2"/>
  <!-- Corner glitches -->
  <rect x="219" y="19" width="20" height="20" fill="none" stroke="#00FFFF" stroke-width="1"/>
  <rect x="561" y="19" width="20" height="20" fill="none" stroke="#00FFFF" stroke-width="1"/>
  <rect x="219" y="411" width="20" height="20" fill="none" stroke="#FFFF00" stroke-width="1"/>
  <rect x="561" y="411" width="20" height="20" fill="none" stroke="#FFFF00" stroke-width="1"/>
  <!-- Title -->
  <text x="400" y="80" font-family="Orbitron, monospace" font-size="26" font-weight="700" fill="#00FFFF" text-anchor="middle">ACCESS</text>
  <line x1="310" y1="92" x2="490" y2="92" stroke="#00FFFF" stroke-width="1" stroke-opacity="0.3"/>
  <text x="400" y="115" font-family="Space Mono, monospace" font-size="11" fill="#E0E0FF" fill-opacity="0.6" text-anchor="middle" letter-spacing="3">ENTER CREDENTIALS</text>
  <!-- Email -->
  <text x="275" y="155" font-family="Space Mono, monospace" font-size="10" fill="#FFFF00" letter-spacing="2">EMAIL</text>
  <rect x="270" y="165" width="260" height="42" fill="none" stroke="#FF00FF" stroke-width="1"/>
  <text x="286" y="191" font-family="Space Mono, monospace" font-size="12" fill="#E0E0FF" fill-opacity="0.3">user@cyberspace.net</text>
  <!-- Password -->
  <text x="275" y="235" font-family="Space Mono, monospace" font-size="10" fill="#FFFF00" letter-spacing="2">PASSWORD</text>
  <rect x="270" y="245" width="260" height="42" fill="none" stroke="#00FFFF" stroke-width="1"/>
  <text x="286" y="271" font-family="Space Mono, monospace" font-size="12" fill="#E0E0FF" fill-opacity="0.3">************</text>
  <!-- Submit -->
  <rect x="270" y="315" width="260" height="44" fill="#FF00FF" fill-opacity="0.2" stroke="#FF00FF" stroke-width="2"/>
  <text x="400" y="343" font-family="Orbitron, monospace" font-size="14" fill="#FF00FF" text-anchor="middle" letter-spacing="3">LOGIN</text>
  <!-- Footer -->
  <text x="400" y="395" font-family="Space Mono, monospace" font-size="11" fill="#E0E0FF" fill-opacity="0.5" text-anchor="middle">New user? <tspan fill="#00FFFF">REGISTER</tspan></text>
</svg>