<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <rect width="800" height="600" fill="#0A0A0A"/>
  <!-- Subtle gradient overlay -->
  <defs>
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#D4AF37;stop-opacity:0.1"/>
      <stop offset="50%" style="stop-color:#D4AF37;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#D4AF37;stop-opacity:0.1"/>
    </linearGradient>
  </defs>
  <!-- Gold accent line top -->
  <rect x="200" y="40" width="400" height="1" fill="#D4AF37"/>
  <!-- Heading -->
  <text x="400" y="120" text-anchor="middle" font-family="Georgia, serif" font-size="48" fill="#D4AF37" letter-spacing="8">LUXURY</text>
  <text x="400" y="160" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="#C0C0C0" letter-spacing="12">D A R K</text>
  <!-- Gold accent line -->
  <rect x="300" y="185" width="200" height="1" fill="#D4AF37" opacity="0.5"/>
  <!-- Content area with thin border -->
  <rect x="80" y="220" width="280" height="300" rx="2" fill="none" stroke="#D4AF37" stroke-width="0.5" opacity="0.4"/>
  <rect x="100" y="240" width="240" height="160" fill="#1A1A1A"/>
  <text x="220" y="330" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#C0C0C0" letter-spacing="3">IMAGE</text>
  <rect x="100" y="420" width="180" height="6" fill="#E5E5E5" opacity="0.3"/>
  <rect x="100" y="440" width="220" height="6" fill="#E5E5E5" opacity="0.2"/>
  <rect x="100" y="460" width="160" height="6" fill="#E5E5E5" opacity="0.2"/>
  <rect x="100" y="490" width="100" height="1" fill="#D4AF37" opacity="0.6"/>
  <!-- Right content -->
  <rect x="440" y="220" width="280" height="300" rx="2" fill="none" stroke="#D4AF37" stroke-width="0.5" opacity="0.4"/>
  <text x="580" y="280" text-anchor="middle" font-family="Georgia, serif" font-size="22" fill="#E5E5E5" letter-spacing="2">Opulence</text>
  <rect x="520" y="300" width="120" height="1" fill="#D4AF37" opacity="0.5"/>
  <rect x="470" y="330" width="220" height="6" fill="#E5E5E5" opacity="0.2"/>
  <rect x="470" y="350" width="200" height="6" fill="#E5E5E5" opacity="0.2"/>
  <rect x="470" y="370" width="210" height="6" fill="#E5E5E5" opacity="0.2"/>
  <rect x="470" y="390" width="180" height="6" fill="#E5E5E5" opacity="0.2"/>
  <!-- Gold button -->
  <rect x="470" y="450" width="140" height="36" rx="1" fill="none" stroke="#D4AF37" stroke-width="1"/>
  <text x="540" y="474" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#D4AF37" letter-spacing="3">DISCOVER</text>
  <!-- Bottom gold line -->
  <rect x="200" y="560" width="400" height="1" fill="#D4AF37"/>
</svg>
