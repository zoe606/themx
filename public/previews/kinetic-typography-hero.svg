<svg width="800" height="450" viewBox="0 0 800 450" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#FFFFFF"/>
  <!-- Giant headline spanning width -->
  <text x="40" y="110" font-family="sans-serif" font-size="72" font-weight="900" fill="#000000">MAKE</text>
  <text x="40" y="190" font-family="sans-serif" font-size="72" font-weight="900" fill="#000000">EVERY <tspan fill="#FF3366">WORD</tspan></text>
  <text x="40" y="270" font-family="sans-serif" font-size="72" font-weight="100" fill="#111111">Count.</text>
  <!-- Divider -->
  <line x1="40" y1="295" x2="760" y2="295" stroke="#000000" stroke-width="2"/>
  <!-- Subtitle -->
  <text x="40" y="330" font-family="sans-serif" font-size="16" font-weight="300" fill="#111111">Typography-first design. No images needed.</text>
  <text x="40" y="352" font-family="sans-serif" font-size="16" font-weight="300" fill="#111111">Words are the design.</text>
  <!-- CTA -->
  <rect x="40" y="380" width="180" height="46" fill="#000000"/>
  <text x="130" y="408" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="700" fill="#FFFFFF">Explore</text>
  <rect x="240" y="380" width="180" height="46" fill="none" stroke="#000000" stroke-width="2"/>
  <text x="330" y="408" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="700" fill="#000000">Read More</text>
  <!-- Right side number accent -->
  <text x="760" y="420" text-anchor="end" font-family="sans-serif" font-size="120" font-weight="900" fill="#000000" opacity="0.05">2024</text>
</svg>
