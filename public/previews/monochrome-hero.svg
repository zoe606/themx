<svg width="800" height="450" viewBox="0 0 800 450" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#FFFFFF"/>
  <!-- Giant headline -->
  <text x="40" y="130" font-family="Georgia, serif" font-size="72" font-weight="700" fill="#111111">Design with</text>
  <text x="40" y="210" font-family="Georgia, serif" font-size="72" font-weight="700" fill="#111111">Restraint.</text>
  <!-- Divider -->
  <line x1="40" y1="235" x2="760" y2="235" stroke="#111111" stroke-width="3"/>
  <!-- Subtitle -->
  <text x="40" y="275" font-family="sans-serif" font-size="18" font-weight="400" fill="#666666">The power of black, white, and everything between.</text>
  <text x="40" y="300" font-family="sans-serif" font-size="18" font-weight="400" fill="#666666">No color needed. Just clarity.</text>
  <!-- CTA -->
  <rect x="40" y="330" width="180" height="48" fill="#111111"/>
  <text x="130" y="360" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="600" fill="#FFFFFF">Explore</text>
  <rect x="240" y="330" width="180" height="48" fill="#FFFFFF" stroke="#111111" stroke-width="2"/>
  <text x="330" y="360" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="600" fill="#111111">Read More</text>
  <!-- Bottom rule -->
  <line x1="40" y1="415" x2="760" y2="415" stroke="#111111" stroke-width="1"/>
  <text x="40" y="440" font-family="sans-serif" font-size="12" fill="#999999">Timeless design for the modern web</text>
  <text x="760" y="440" text-anchor="end" font-family="Georgia, serif" font-size="12" fill="#999999">Est. 2022</text>
</svg>
