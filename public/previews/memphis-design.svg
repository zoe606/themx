<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <rect width="800" height="600" fill="#FFFFFF"/>
  <!-- Background pattern dots -->
  <circle cx="50" cy="50" r="6" fill="#FF6B6B" opacity="0.3"/>
  <circle cx="90" cy="50" r="6" fill="#FF6B6B" opacity="0.3"/>
  <circle cx="130" cy="50" r="6" fill="#FF6B6B" opacity="0.3"/>
  <circle cx="50" cy="90" r="6" fill="#FF6B6B" opacity="0.3"/>
  <circle cx="90" cy="90" r="6" fill="#FF6B6B" opacity="0.3"/>
  <circle cx="130" cy="90" r="6" fill="#FF6B6B" opacity="0.3"/>
  <!-- Scattered geometric shapes -->
  <circle cx="680" cy="100" r="50" fill="#4ECDC4" stroke="#2D2D2D" stroke-width="3"/>
  <polygon points="120,400 180,500 60,500" fill="#FFE66D" stroke="#2D2D2D" stroke-width="3"/>
  <rect x="600" y="350" width="80" height="80" fill="#FF6B6B" stroke="#2D2D2D" stroke-width="3" transform="rotate(15 640 390)"/>
  <!-- Squiggly line -->
  <path d="M0,300 Q50,270 100,300 Q150,330 200,300 Q250,270 300,300 Q350,330 400,300 Q450,270 500,300 Q550,330 600,300 Q650,270 700,300 Q750,330 800,300" fill="none" stroke="#FF6B6B" stroke-width="4"/>
  <!-- Large title -->
  <text x="200" y="200" font-family="sans-serif" font-size="72" font-weight="900" fill="#2D2D2D" stroke="#2D2D2D" stroke-width="1">MEMPHIS</text>
  <text x="260" y="260" font-family="sans-serif" font-size="36" font-weight="700" fill="#4ECDC4">DESIGN</text>
  <!-- Zigzag pattern -->
  <polyline points="40,560 70,530 100,560 130,530 160,560 190,530 220,560 250,530 280,560" fill="none" stroke="#FFE66D" stroke-width="4"/>
  <!-- Checkerboard section -->
  <rect x="400" y="420" width="30" height="30" fill="#2D2D2D"/>
  <rect x="460" y="420" width="30" height="30" fill="#2D2D2D"/>
  <rect x="430" y="450" width="30" height="30" fill="#2D2D2D"/>
  <rect x="400" y="480" width="30" height="30" fill="#2D2D2D"/>
  <rect x="460" y="480" width="30" height="30" fill="#2D2D2D"/>
  <!-- More circles -->
  <circle cx="350" cy="450" r="30" fill="none" stroke="#4ECDC4" stroke-width="4"/>
  <circle cx="350" cy="450" r="15" fill="#4ECDC4"/>
  <!-- Thick outlined element -->
  <rect x="550" y="220" width="180" height="80" rx="8" fill="#FFE66D" stroke="#2D2D2D" stroke-width="4"/>
  <text x="640" y="268" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="#2D2D2D">PLAYFUL</text>
  <!-- Small decorative elements -->
  <circle cx="500" cy="100" r="12" fill="#FF6B6B"/>
  <rect x="300" y="340" width="20" height="20" fill="#FFE66D" stroke="#2D2D2D" stroke-width="2" transform="rotate(45 310 350)"/>
  <circle cx="200" cy="350" r="8" fill="#4ECDC4"/>
</svg>
