<svg width="800" height="450" viewBox="0 0 800 450" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#FFFBFE"/>
  <!-- Form card -->
  <rect x="225" y="30" width="350" height="390" rx="28" fill="#FFFBFE" stroke="#1C1B1F" stroke-opacity="0.08" stroke-width="1"/>
  <!-- Title -->
  <text x="400" y="80" font-family="Roboto, sans-serif" font-size="24" font-weight="400" fill="#1C1B1F" text-anchor="middle">Sign In</text>
  <text x="400" y="105" font-family="Roboto, sans-serif" font-size="14" fill="#1C1B1F" fill-opacity="0.6" text-anchor="middle">Welcome back to your account</text>
  <!-- Email outlined text field (M3 style) -->
  <rect x="275" y="130" width="250" height="52" rx="4" fill="none" stroke="#625B71" stroke-width="1"/>
  <rect x="285" y="123" width="40" height="14" fill="#FFFBFE"/>
  <text x="287" y="134" font-family="Roboto, sans-serif" font-size="11" fill="#6750A4">Email</text>
  <text x="290" y="162" font-family="Roboto, sans-serif" font-size="14" fill="#1C1B1F" fill-opacity="0.35">you@example.com</text>
  <!-- Password outlined text field -->
  <rect x="275" y="205" width="250" height="52" rx="4" fill="none" stroke="#625B71" stroke-width="1"/>
  <rect x="285" y="198" width="60" height="14" fill="#FFFBFE"/>
  <text x="287" y="209" font-family="Roboto, sans-serif" font-size="11" fill="#6750A4">Password</text>
  <text x="290" y="237" font-family="Roboto, sans-serif" font-size="14" fill="#1C1B1F" fill-opacity="0.35">Enter password</text>
  <!-- Filled button -->
  <rect x="275" y="285" width="250" height="44" rx="22" fill="#6750A4"/>
  <text x="400" y="313" font-family="Roboto, sans-serif" font-size="14" font-weight="500" fill="#FFFFFF" text-anchor="middle">Sign In</text>
  <!-- Outlined button -->
  <rect x="275" y="342" width="250" height="44" rx="22" fill="none" stroke="#6750A4" stroke-width="1"/>
  <text x="400" y="370" font-family="Roboto, sans-serif" font-size="14" font-weight="500" fill="#6750A4" text-anchor="middle">Create Account</text>
  <!-- Decorative background surfaces -->
  <rect x="40" y="80" width="140" height="100" rx="20" fill="#6750A4" fill-opacity="0.05"/>
  <rect x="620" y="280" width="140" height="100" rx="20" fill="#7D5260" fill-opacity="0.05"/>
</svg>