<svg width="800" height="450" viewBox="0 0 800 450" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#F5F0EB"/>
  <!-- Title -->
  <text x="400" y="45" font-family="Cormorant Garamond, Georgia, serif" font-size="26" fill="#2C2420" text-anchor="middle">Principles</text>
  <line x1="370" y1="55" x2="430" y2="55" stroke="#C4956A" stroke-width="1" stroke-opacity="0.5"/>
  <!-- Card 1 -->
  <rect x="50" y="80" width="220" height="310" rx="20" fill="#FFFFFF" fill-opacity="0.6"/>
  <ellipse cx="160" cy="140" rx="30" ry="30" fill="#8B7355" fill-opacity="0.08"/>
  <circle cx="160" cy="140" r="16" fill="#8B7355" fill-opacity="0.15"/>
  <text x="160" y="200" font-family="Cormorant Garamond, Georgia, serif" font-size="22" fill="#2C2420" text-anchor="middle">Simplicity</text>
  <text x="160" y="230" font-family="Source Sans 3, sans-serif" font-size="13" fill="#2C2420" fill-opacity="0.6" text-anchor="middle">Remove the unnecessary.</text>
  <text x="160" y="250" font-family="Source Sans 3, sans-serif" font-size="13" fill="#2C2420" fill-opacity="0.6" text-anchor="middle">Keep what matters most.</text>
  <rect x="110" y="310" width="100" height="36" rx="18" fill="#8B7355" fill-opacity="0.1"/>
  <text x="160" y="334" font-family="Source Sans 3, sans-serif" font-size="12" fill="#8B7355" text-anchor="middle">Discover</text>
  <!-- Card 2 -->
  <rect x="290" y="80" width="220" height="310" rx="20" fill="#FFFFFF" fill-opacity="0.6"/>
  <ellipse cx="400" cy="140" rx="30" ry="30" fill="#6B8E7B" fill-opacity="0.08"/>
  <circle cx="400" cy="140" r="16" fill="#6B8E7B" fill-opacity="0.15"/>
  <text x="400" y="200" font-family="Cormorant Garamond, Georgia, serif" font-size="22" fill="#2C2420" text-anchor="middle">Nature</text>
  <text x="400" y="230" font-family="Source Sans 3, sans-serif" font-size="13" fill="#2C2420" fill-opacity="0.6" text-anchor="middle">Warm earth tones and</text>
  <text x="400" y="250" font-family="Source Sans 3, sans-serif" font-size="13" fill="#2C2420" fill-opacity="0.6" text-anchor="middle">organic forms connect.</text>
  <rect x="350" y="310" width="100" height="36" rx="18" fill="#6B8E7B" fill-opacity="0.1"/>
  <text x="400" y="334" font-family="Source Sans 3, sans-serif" font-size="12" fill="#6B8E7B" text-anchor="middle">Discover</text>
  <!-- Card 3 -->
  <rect x="530" y="80" width="220" height="310" rx="20" fill="#FFFFFF" fill-opacity="0.6"/>
  <ellipse cx="640" cy="140" rx="30" ry="30" fill="#C4956A" fill-opacity="0.08"/>
  <circle cx="640" cy="140" r="16" fill="#C4956A" fill-opacity="0.15"/>
  <text x="640" y="200" font-family="Cormorant Garamond, Georgia, serif" font-size="22" fill="#2C2420" text-anchor="middle">Craft</text>
  <text x="640" y="230" font-family="Source Sans 3, sans-serif" font-size="13" fill="#2C2420" fill-opacity="0.6" text-anchor="middle">Thoughtful attention to</text>
  <text x="640" y="250" font-family="Source Sans 3, sans-serif" font-size="13" fill="#2C2420" fill-opacity="0.6" text-anchor="middle">every detail.</text>
  <rect x="590" y="310" width="100" height="36" rx="18" fill="#C4956A" fill-opacity="0.1"/>
  <text x="640" y="334" font-family="Source Sans 3, sans-serif" font-size="12" fill="#C4956A" text-anchor="middle">Discover</text>
  <!-- Bottom organic line -->
  <path d="M100 420 Q300 410 500 425 Q700 440 750 415" stroke="#8B7355" stroke-width="0.5" fill="none" stroke-opacity="0.2"/>
</svg>