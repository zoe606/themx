<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="sk-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8E9EB"/>
      <stop offset="100%" stop-color="#D1D5DB"/>
    </linearGradient>
    <linearGradient id="sk-btn-blue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="sk-btn-red" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F87171"/>
      <stop offset="100%" stop-color="#DC2626"/>
    </linearGradient>
    <linearGradient id="sk-card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F3F4F6"/>
    </linearGradient>
    <filter id="sk-shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000000" flood-opacity="0.15"/>
    </filter>
    <filter id="sk-inset">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000000" flood-opacity="0.1"/>
    </filter>
  </defs>
  <rect width="800" height="600" fill="url(#sk-bg)"/>
  <!-- Title bar with gradient -->
  <rect x="40" y="30" width="720" height="70" rx="10" fill="url(#sk-card)" filter="url(#sk-shadow)"/>
  <rect x="40" y="30" width="720" height="2" rx="1" fill="#FFFFFF" opacity="0.8"/>
  <text x="400" y="75" text-anchor="middle" font-family="Merriweather, serif" font-size="26" font-weight="700" fill="#1F2937">Skeuomorphism Revival</text>
  <!-- Cards with realistic depth -->
  <rect x="40" y="140" width="220" height="280" rx="12" fill="url(#sk-card)" filter="url(#sk-shadow)"/>
  <rect x="40" y="140" width="220" height="2" rx="1" fill="#FFFFFF" opacity="0.6"/>
  <rect x="60" y="165" width="180" height="100" rx="8" fill="#E5E7EB"/>
  <circle cx="150" cy="215" r="26" fill="url(#sk-btn-blue)" filter="url(#sk-inset)"/>
  <text x="150" y="222" text-anchor="middle" font-family="sans-serif" font-size="20" fill="#FFFFFF">i</text>
  <text x="150" y="300" text-anchor="middle" font-family="Merriweather, serif" font-size="16" font-weight="700" fill="#1F2937">Information</text>
  <text x="150" y="322" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#6B7280">Detailed insights</text>
  <rect x="80" y="350" width="140" height="40" rx="8" fill="url(#sk-btn-blue)" filter="url(#sk-inset)"/>
  <rect x="80" y="350" width="140" height="2" rx="1" fill="#FFFFFF" opacity="0.3"/>
  <text x="150" y="375" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="600" fill="#FFFFFF">View Details</text>
  <rect x="290" y="140" width="220" height="280" rx="12" fill="url(#sk-card)" filter="url(#sk-shadow)"/>
  <rect x="290" y="140" width="220" height="2" rx="1" fill="#FFFFFF" opacity="0.6"/>
  <rect x="310" y="165" width="180" height="100" rx="8" fill="#E5E7EB"/>
  <circle cx="400" cy="215" r="26" fill="url(#sk-btn-red)" filter="url(#sk-inset)"/>
  <text x="400" y="222" text-anchor="middle" font-family="sans-serif" font-size="20" fill="#FFFFFF">!</text>
  <text x="400" y="300" text-anchor="middle" font-family="Merriweather, serif" font-size="16" font-weight="700" fill="#1F2937">Notifications</text>
  <text x="400" y="322" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#6B7280">Stay updated</text>
  <rect x="330" y="350" width="140" height="40" rx="8" fill="url(#sk-btn-red)" filter="url(#sk-inset)"/>
  <rect x="330" y="350" width="140" height="2" rx="1" fill="#FFFFFF" opacity="0.3"/>
  <text x="400" y="375" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="600" fill="#FFFFFF">View All</text>
  <rect x="540" y="140" width="220" height="280" rx="12" fill="url(#sk-card)" filter="url(#sk-shadow)"/>
  <rect x="540" y="140" width="220" height="2" rx="1" fill="#FFFFFF" opacity="0.6"/>
  <rect x="560" y="165" width="180" height="100" rx="8" fill="#E5E7EB"/>
  <circle cx="650" cy="215" r="26" fill="#F59E0B" filter="url(#sk-inset)"/>
  <text x="650" y="222" text-anchor="middle" font-family="sans-serif" font-size="20" fill="#FFFFFF">*</text>
  <text x="650" y="300" text-anchor="middle" font-family="Merriweather, serif" font-size="16" font-weight="700" fill="#1F2937">Favorites</text>
  <text x="650" y="322" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#6B7280">Your top picks</text>
  <rect x="580" y="350" width="140" height="40" rx="8" fill="#F59E0B" filter="url(#sk-inset)"/>
  <rect x="580" y="350" width="140" height="2" rx="1" fill="#FFFFFF" opacity="0.3"/>
  <text x="650" y="375" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="600" fill="#FFFFFF">Browse</text>
  <!-- Bottom bar -->
  <rect x="40" y="470" width="720" height="90" rx="10" fill="url(#sk-card)" filter="url(#sk-shadow)"/>
  <rect x="40" y="470" width="720" height="2" rx="1" fill="#FFFFFF" opacity="0.6"/>
  <text x="400" y="510" text-anchor="middle" font-family="Merriweather, serif" font-size="16" font-weight="700" fill="#1F2937">Realistic Textures, Tangible Interfaces</text>
  <text x="400" y="535" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#6B7280">Physical material metaphors guiding modern design</text>
</svg>
