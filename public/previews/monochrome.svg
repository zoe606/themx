<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <rect width="800" height="600" fill="#FFFFFF"/>
  <!-- Bold heading -->
  <text x="40" y="90" font-family="Georgia, serif" font-size="52" font-weight="700" fill="#111111">Monochrome</text>
  <line x1="40" y1="110" x2="760" y2="110" stroke="#111111" stroke-width="3"/>
  <!-- Subheading -->
  <text x="40" y="148" font-family="sans-serif" font-size="16" fill="#666666">The power of black, white, and everything between</text>
  <!-- Three column layout -->
  <line x1="280" y1="180" x2="280" y2="440" stroke="#111111" stroke-width="1"/>
  <line x1="530" y1="180" x2="530" y2="440" stroke="#111111" stroke-width="1"/>
  <!-- Column 1 -->
  <text x="40" y="215" font-family="Georgia, serif" font-size="64" font-weight="700" fill="#111111">01</text>
  <text x="40" y="248" font-family="Georgia, serif" font-size="20" font-weight="700" fill="#111111">Typography</text>
  <text x="40" y="275" font-family="sans-serif" font-size="13" fill="#666666">Strong hierarchy through</text>
  <text x="40" y="293" font-family="sans-serif" font-size="13" fill="#666666">size, weight, and style.</text>
  <rect x="40" y="320" width="220" height="110" rx="0" fill="#111111"/>
  <text x="150" y="380" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#FFFFFF">Black space</text>
  <!-- Column 2 -->
  <text x="300" y="215" font-family="Georgia, serif" font-size="64" font-weight="700" fill="#111111">02</text>
  <text x="300" y="248" font-family="Georgia, serif" font-size="20" font-weight="700" fill="#111111">Contrast</text>
  <text x="300" y="275" font-family="sans-serif" font-size="13" fill="#666666">Bold dividing lines and</text>
  <text x="300" y="293" font-family="sans-serif" font-size="13" fill="#666666">dramatic value shifts.</text>
  <rect x="300" y="320" width="210" height="110" rx="0" fill="#FFFFFF" stroke="#111111" stroke-width="2"/>
  <text x="405" y="380" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#111111">White space</text>
  <!-- Column 3 -->
  <text x="550" y="215" font-family="Georgia, serif" font-size="64" font-weight="700" fill="#111111">03</text>
  <text x="550" y="248" font-family="Georgia, serif" font-size="20" font-weight="700" fill="#111111">Restraint</text>
  <text x="550" y="275" font-family="sans-serif" font-size="13" fill="#666666">No color — depth through</text>
  <text x="550" y="293" font-family="sans-serif" font-size="13" fill="#666666">value and composition.</text>
  <rect x="550" y="320" width="210" height="110" rx="0" fill="#999999"/>
  <text x="655" y="380" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#FFFFFF">Gray space</text>
  <!-- Bottom divider -->
  <line x1="40" y1="460" x2="760" y2="460" stroke="#111111" stroke-width="3"/>
  <!-- Bottom section -->
  <text x="40" y="510" font-family="Georgia, serif" font-size="36" font-weight="700" fill="#111111">Timeless.</text>
  <text x="300" y="510" font-family="Georgia, serif" font-size="36" font-weight="700" fill="#666666">Elegant.</text>
  <text x="520" y="510" font-family="Georgia, serif" font-size="36" font-weight="700" fill="#999999">Refined.</text>
  <rect x="40" y="540" width="160" height="40" fill="#111111"/>
  <text x="120" y="566" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="600" fill="#FFFFFF">Explore</text>
</svg>
