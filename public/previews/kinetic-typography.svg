<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <rect width="800" height="600" fill="#FFFFFF"/>
  <!-- Giant headline -->
  <text x="40" y="120" font-family="sans-serif" font-size="80" font-weight="900" fill="#000000">WORDS</text>
  <text x="40" y="200" font-family="sans-serif" font-size="80" font-weight="900" fill="#000000">ARE <tspan fill="#FF3366">DESIGN</tspan></text>
  <!-- Thin divider -->
  <line x1="40" y1="230" x2="760" y2="230" stroke="#000000" stroke-width="2"/>
  <!-- Subtitle in lighter weight -->
  <text x="40" y="270" font-family="sans-serif" font-size="18" font-weight="300" fill="#111111">When typography becomes the primary visual element,</text>
  <text x="40" y="296" font-family="sans-serif" font-size="18" font-weight="300" fill="#111111">every word carries intention and every letter matters.</text>
  <!-- Mixed-size text blocks -->
  <text x="40" y="380" font-family="sans-serif" font-size="48" font-weight="900" fill="#111111">01</text>
  <text x="120" y="365" font-family="sans-serif" font-size="16" font-weight="700" fill="#111111">EDITORIAL</text>
  <text x="120" y="385" font-family="sans-serif" font-size="13" font-weight="300" fill="#111111">Magazine-inspired layouts</text>
  <text x="300" y="380" font-family="sans-serif" font-size="48" font-weight="900" fill="#111111">02</text>
  <text x="380" y="365" font-family="sans-serif" font-size="16" font-weight="700" fill="#111111">EXPRESSIVE</text>
  <text x="380" y="385" font-family="sans-serif" font-size="13" font-weight="300" fill="#111111">Type as visual art</text>
  <text x="560" y="380" font-family="sans-serif" font-size="48" font-weight="900" fill="#111111">03</text>
  <text x="640" y="365" font-family="sans-serif" font-size="16" font-weight="700" fill="#111111">KINETIC</text>
  <text x="640" y="385" font-family="sans-serif" font-size="13" font-weight="300" fill="#111111">Motion and rhythm</text>
  <!-- Bottom divider -->
  <line x1="40" y1="420" x2="760" y2="420" stroke="#000000" stroke-width="1"/>
  <!-- Bottom large text -->
  <text x="40" y="500" font-family="sans-serif" font-size="64" font-weight="100" fill="#111111">Less imagery.</text>
  <text x="40" y="570" font-family="sans-serif" font-size="64" font-weight="900" fill="#111111">More <tspan fill="#3366FF">impact.</tspan></text>
</svg>
