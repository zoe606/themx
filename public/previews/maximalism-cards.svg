<svg width="800" height="450" viewBox="0 0 800 450" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#FFF7ED"/>
  <!-- Background decorations -->
  <circle cx="400" cy="225" r="200" fill="#F97316" fill-opacity="0.05"/>
  <rect x="0" y="0" width="800" height="8" fill="#E11D48"/>
  <!-- Title -->
  <text x="400" y="55" font-family="Archivo Black, sans-serif" font-size="30" font-weight="900" fill="#E11D48" text-anchor="middle">FEATURES!!!</text>
  <path d="M250 62 Q400 72 550 62" stroke="#7C3AED" stroke-width="3" fill="none"/>
  <!-- Card 1 — rotated slightly -->
  <g transform="rotate(-2 175 240)">
    <rect x="40" y="90" width="220" height="300" rx="0" fill="#E11D48"/>
    <rect x="45" y="95" width="210" height="120" fill="#FFF7ED"/>
    <text x="150" y="158" font-family="Archivo Black, sans-serif" font-size="48" fill="#E11D48" text-anchor="middle">01</text>
    <text x="60" y="248" font-family="Archivo Black, sans-serif" font-size="20" fill="#FFFFFF">SPEED</text>
    <text x="60" y="275" font-family="DM Sans, sans-serif" font-size="13" fill="#FFFFFF" fill-opacity="0.8">Blazingly fast with</text>
    <text x="60" y="293" font-family="DM Sans, sans-serif" font-size="13" fill="#FFFFFF" fill-opacity="0.8">zero compromises.</text>
    <rect x="55" y="330" width="100" height="36" fill="#F97316"/>
    <text x="105" y="354" font-family="Archivo Black, sans-serif" font-size="12" fill="#FFFFFF" text-anchor="middle">GO!</text>
  </g>
  <!-- Card 2 -->
  <g transform="rotate(1 400 240)">
    <rect x="290" y="90" width="220" height="300" rx="0" fill="#7C3AED"/>
    <rect x="295" y="95" width="210" height="120" fill="#FFF7ED"/>
    <text x="400" y="158" font-family="Archivo Black, sans-serif" font-size="48" fill="#7C3AED" text-anchor="middle">02</text>
    <text x="305" y="248" font-family="Archivo Black, sans-serif" font-size="20" fill="#FFFFFF">STYLE</text>
    <text x="305" y="275" font-family="DM Sans, sans-serif" font-size="13" fill="#FFFFFF" fill-opacity="0.8">Bold, chaotic, and</text>
    <text x="305" y="293" font-family="DM Sans, sans-serif" font-size="13" fill="#FFFFFF" fill-opacity="0.8">beautifully loud.</text>
    <rect x="305" y="330" width="100" height="36" rx="18" fill="#F97316"/>
    <text x="355" y="354" font-family="Archivo Black, sans-serif" font-size="12" fill="#FFFFFF" text-anchor="middle">WOW!</text>
  </g>
  <!-- Card 3 — rotated the other way -->
  <g transform="rotate(-1 640 240)">
    <rect x="540" y="90" width="220" height="300" rx="0" fill="#F97316"/>
    <rect x="545" y="95" width="210" height="120" fill="#FFF7ED"/>
    <text x="650" y="158" font-family="Archivo Black, sans-serif" font-size="48" fill="#F97316" text-anchor="middle">03</text>
    <text x="555" y="248" font-family="Archivo Black, sans-serif" font-size="20" fill="#FFFFFF">CHAOS</text>
    <text x="555" y="275" font-family="DM Sans, sans-serif" font-size="13" fill="#FFFFFF" fill-opacity="0.8">Deliberate disorder</text>
    <text x="555" y="293" font-family="DM Sans, sans-serif" font-size="13" fill="#FFFFFF" fill-opacity="0.8">that just works.</text>
    <rect x="555" y="330" width="100" height="36" fill="#E11D48"/>
    <text x="605" y="354" font-family="Archivo Black, sans-serif" font-size="12" fill="#FFFFFF" text-anchor="middle">YES!</text>
  </g>
  <!-- Stars scattered -->
  <polygon points="770,50 773,60 783,60 775,66 778,76 770,70 762,76 765,66 757,60 767,60" fill="#E11D48"/>
  <polygon points="30,420 33,428 41,428 35,433 37,441 30,436 23,441 25,433 19,428 27,428" fill="#7C3AED"/>
</svg>