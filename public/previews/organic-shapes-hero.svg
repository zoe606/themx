<svg width="800" height="450" viewBox="0 0 800 450" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#FFF7ED"/>
  <!-- Background blobs -->
  <ellipse cx="680" cy="100" rx="200" ry="160" fill="#F97316" opacity="0.1" transform="rotate(-20 680 100)"/>
  <ellipse cx="100" cy="380" rx="160" ry="120" fill="#8B5CF6" opacity="0.08" transform="rotate(15 100 380)"/>
  <ellipse cx="700" cy="350" rx="120" ry="90" fill="#22D3EE" opacity="0.08"/>
  <!-- Heading -->
  <text x="60" y="130" font-family="DM Sans, sans-serif" font-size="48" font-weight="700" fill="#1C1917">Designs That</text>
  <text x="60" y="190" font-family="DM Sans, sans-serif" font-size="48" font-weight="700" fill="#F97316">Feel Alive</text>
  <!-- Subtitle -->
  <text x="60" y="235" font-family="DM Sans, sans-serif" font-size="17" fill="#1C1917" opacity="0.5">Nature-inspired organic forms that breathe</text>
  <text x="60" y="260" font-family="DM Sans, sans-serif" font-size="17" fill="#1C1917" opacity="0.5">life into every interaction.</text>
  <!-- CTA buttons -->
  <rect x="60" y="290" width="190" height="48" rx="24" fill="#F97316"/>
  <text x="155" y="319" text-anchor="middle" font-family="DM Sans, sans-serif" font-size="15" font-weight="600" fill="#FFFFFF">Get Started</text>
  <rect x="270" y="290" width="170" height="48" rx="24" fill="none" stroke="#F97316" stroke-width="2"/>
  <text x="355" y="319" text-anchor="middle" font-family="DM Sans, sans-serif" font-size="15" font-weight="600" fill="#F97316">See Examples</text>
  <!-- Floating blob shapes on right -->
  <ellipse cx="600" cy="180" rx="80" ry="70" fill="#F97316" opacity="0.15" transform="rotate(10 600 180)"/>
  <ellipse cx="680" cy="220" rx="60" ry="50" fill="#8B5CF6" opacity="0.15" transform="rotate(-10 680 220)"/>
  <ellipse cx="620" cy="270" rx="50" ry="40" fill="#22D3EE" opacity="0.15"/>
  <!-- Wavy divider -->
  <path d="M0 390 Q100 370 200 390 T400 390 T600 390 T800 390 L800 395 Q700 415 600 395 T400 395 T200 395 T0 395 Z" fill="#F97316" opacity="0.12"/>
  <text x="400" y="435" text-anchor="middle" font-family="DM Sans, sans-serif" font-size="13" fill="#1C1917" opacity="0.4">Trusted by creative teams everywhere</text>
</svg>
