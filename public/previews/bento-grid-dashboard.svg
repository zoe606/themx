  <rect x="296" y="310" width="30" height="100" rx="6" fill="#3B82F6" fill-opacity="0.4"/>
  <rect x="342" y="280" width="30" height="130" rx="6" fill="#3B82F6"/>
  <rect x="388" y="320" width="30" height="90" rx="6" fill="#3B82F6" fill-opacity="0.4"/>
