<svg width="800" height="450" viewBox="0 0 800 450" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#0D1117"/>
  <!-- Ornamental frame -->
  <rect x="225" y="20" width="350" height="410" fill="none" stroke="#B8860B" stroke-width="1"/>
  <rect x="230" y="25" width="340" height="400" fill="none" stroke="#B8860B" stroke-width="0.5" stroke-opacity="0.3"/>
  <!-- Corner chevrons -->
  <polyline points="225,20 245,10 265,20" fill="none" stroke="#C9B037" stroke-width="0.5"/>
  <polyline points="535,20 555,10 575,20" fill="none" stroke="#C9B037" stroke-width="0.5"/>
  <!-- Fan ornament top -->
  <path d="M400 50 L370 30 L380 30 L400 45 L420 30 L430 30 Z" fill="#B8860B" fill-opacity="0.15"/>
  <!-- Title -->
  <text x="400" y="85" font-family="Poiret One, serif" font-size="28" fill="#E8DCC8" text-anchor="middle" letter-spacing="4">WELCOME</text>
  <line x1="320" y1="98" x2="370" y2="98" stroke="#B8860B" stroke-width="0.5"/>
  <circle cx="400" cy="98" r="3" fill="#B8860B"/>
  <line x1="430" y1="98" x2="480" y2="98" stroke="#B8860B" stroke-width="0.5"/>
  <text x="400" y="120" font-family="Raleway, sans-serif" font-size="10" fill="#E8DCC8" fill-opacity="0.5" text-anchor="middle" letter-spacing="3">SIGN IN TO YOUR ACCOUNT</text>
  <!-- Email -->
  <text x="280" y="160" font-family="Raleway, sans-serif" font-size="10" fill="#B8860B" letter-spacing="2">EMAIL</text>
  <rect x="275" y="170" width="250" height="40" fill="none" stroke="#B8860B" stroke-width="0.5" stroke-opacity="0.4"/>
  <text x="290" y="195" font-family="Raleway, sans-serif" font-size="12" fill="#E8DCC8" fill-opacity="0.25">you@example.com</text>
  <!-- Password -->
  <text x="280" y="236" font-family="Raleway, sans-serif" font-size="10" fill="#B8860B" letter-spacing="2">PASSWORD</text>
  <rect x="275" y="246" width="250" height="40" fill="none" stroke="#B8860B" stroke-width="0.5" stroke-opacity="0.4"/>
  <text x="290" y="271" font-family="Raleway, sans-serif" font-size="12" fill="#E8DCC8" fill-opacity="0.25">Enter password</text>
  <!-- Submit -->
  <rect x="275" y="310" width="250" height="42" fill="#B8860B" fill-opacity="0.1" stroke="#B8860B" stroke-width="1"/>
  <text x="400" y="336" font-family="Raleway, sans-serif" font-size="11" fill="#B8860B" text-anchor="middle" letter-spacing="3">SIGN IN</text>
  <!-- Footer -->
  <text x="400" y="390" font-family="Raleway, sans-serif" font-size="11" fill="#E8DCC8" fill-opacity="0.4" text-anchor="middle">No account? <tspan fill="#B8860B">Register</tspan></text>
  <!-- Side decorative lines -->
  <line x1="100" y1="100" x2="100" y2="350" stroke="#B8860B" stroke-width="0.5" stroke-opacity="0.08"/>
  <line x1="110" y1="120" x2="110" y2="330" stroke="#B8860B" stroke-width="0.5" stroke-opacity="0.06"/>
  <line x1="700" y1="100" x2="700" y2="350" stroke="#B8860B" stroke-width="0.5" stroke-opacity="0.08"/>
  <line x1="690" y1="120" x2="690" y2="330" stroke="#B8860B" stroke-width="0.5" stroke-opacity="0.06"/>
</svg>